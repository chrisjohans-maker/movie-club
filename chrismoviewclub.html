<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chris's Movie Club</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0A0500;font-family:'Special Elite',serif;color:#F9F0DC;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.header{text-align:center;padding:1.1rem 1rem .9rem;border-bottom:1px solid #2a1f00}
.header-rule{height:1px;background:linear-gradient(to right,transparent,#5a3a00,#F5C842,#5a3a00,transparent);margin:0 0 .6rem}
.header-rule.bottom{margin:.5rem 0 0}
.bulb-row{display:flex;justify-content:center;gap:16px;margin-bottom:7px}
.bulb-row.bottom{margin-top:7px;margin-bottom:0}
.bulb{width:8px;height:8px;border-radius:50%;background:#FFF8C0;flex-shrink:0}
.bulb.on{box-shadow:0 0 4px 1px #FFF8C0,0 0 10px 3px #FFD700;opacity:1}
.bulb.dim{opacity:.12}
.club-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:6px;color:#F5C842;text-shadow:0 0 16px rgba(245,200,66,.3)}
.club-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;color:#b89a40;margin-top:2px}
.members-line{font-size:10px;color:#7a6030;letter-spacing:2px;margin-top:4px}
.snack-bar{display:flex;justify-content:center;gap:18px;padding:.55rem 0;border-top:1px solid #1a1200;margin-top:.6rem}
.edit-form{background:#0d0600;border:1px solid #3a2f00;padding:.9rem;margin-top:8px}
.edit-form-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:#F5C842;margin-bottom:.75rem}
.card.drag-over{border-color:#F5C842}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.confirm-box{background:#100800;border:1px solid #4a3500;padding:1.25rem;max-width:320px;width:100%;text-align:center}
.confirm-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:#F5C842;margin-bottom:.5rem}
.confirm-sub{font-size:12px;color:#7a6030;font-family:'Special Elite',serif;margin-bottom:1rem;line-height:1.5}
.confirm-actions{display:flex;gap:8px;justify-content:center}
.summary-wrap{text-align:center;padding:.5rem 0}
.summary-poster{width:110px;margin:0 auto .9rem;display:block;border:1px solid #2a1f00}
.summary-poster-ph{width:110px;height:160px;margin:0 auto .9rem;border:1px solid #2a1f00;background:#100800;display:flex;align-items:center;justify-content:center;font-size:32px;color:#2a1f00}
.summary-title{font-family:'Playfair Display',serif;font-weight:700;font-size:19px;color:#F9F0DC;margin-bottom:.2rem}
.summary-sub{font-size:11px;color:#7a6030;font-style:italic;margin-bottom:.75rem}
.summary-avg{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#F5C842;margin-bottom:.25rem}
.summary-avg-label{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:#5a4020;margin-bottom:1.25rem}
.summary-scores{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:1rem}
.ss-cell{padding:.6rem .5rem;text-align:center;border:1px solid #2a1f00}
.ss-name{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;margin-bottom:2px}
.ss-score{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#F9F0DC}
.summary-stat{background:#100800;border:1px solid #2a1f00;padding:.7rem .9rem;margin-bottom:6px;text-align:left}
.summary-stat-label{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:#5a4020;margin-bottom:3px}
.summary-stat-val{font-size:13px;color:#F9F0DC;font-family:'Special Elite',serif}
.comments-section{margin-top:1rem;text-align:left}
.comment-row{display:flex;align-items:flex-start;gap:8px;padding:.6rem 0;border-bottom:1px solid #1a1200}
.comment-row:last-child{border-bottom:none}
.comment-name{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;min-width:60px;flex-shrink:0;margin-top:2px}
.comment-text{font-size:12px;color:#b89a40;font-family:'Special Elite',serif;font-style:italic;flex:1;line-height:1.5}
.comment-input{width:100%;background:#050300;border:1px solid #2a1f00;color:#F9F0DC;font-family:'Special Elite',serif;font-size:13px;padding:6px 8px;outline:none;font-style:italic}
.comment-input:focus{border-color:#E8A020}
.comment-input::placeholder{color:#3a2f00}
.snack-icon{font-size:16px;line-height:1}
@keyframes nuggetBounce{0%,100%{transform:translateY(0)}45%{transform:translateY(-4px)}70%{transform:translateY(-2px)}}
@keyframes pizzaSpin{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes beerSlosh{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes whiskeySwirl{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes popcornPop{0%,85%,100%{transform:translateY(0) scale(1)}92%{transform:translateY(-5px) scale(1.15)}}
.snack-nugget{animation:nuggetBounce 1.2s ease-in-out infinite}
.snack-pizza{animation:pizzaSpin 2.2s ease-in-out infinite}
.snack-beer{animation:beerSlosh 1.5s ease-in-out infinite}
.snack-whiskey{animation:whiskeySwirl 2.5s ease-in-out infinite}
.snack-popcorn{animation:popcornPop 1.9s ease-in-out infinite}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4a8a10;display:inline-block;margin-left:6px;vertical-align:middle}
.sync-dot.off{background:#6a2020}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#080400;border-top:1px solid #2a1f00;display:flex;z-index:100}
.nav-btn{flex:1;padding:10px 4px 8px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:#5a4020;cursor:pointer;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:#F5C842}
.nav-icon{font-size:16px;line-height:1}
.content{padding:.9rem}
.section-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:#7a6030;margin:1rem 0 .5rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#2a1f00}
.card{background:#100800;border:1px solid #2a1f00;padding:.85rem .9rem;margin-bottom:8px}
.add-btn{width:100%;padding:11px;background:transparent;border:1px solid #3a2f00;color:#b89a40;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;cursor:pointer;margin-bottom:1rem;display:block}
.add-btn:active{background:#1a1000}
.card-top{display:flex;gap:10px;margin-bottom:6px}
.poster{width:52px;height:76px;object-fit:cover;flex-shrink:0;border:1px solid #2a1f00;background:#080400}
.poster-ph{width:52px;height:76px;flex-shrink:0;border:1px solid #2a1f00;background:#080400;display:flex;align-items:center;justify-content:center;font-size:22px;color:#2a1f00}
.card-meta{flex:1;min-width:0}
.movie-title{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;color:#F9F0DC;line-height:1.3}
.movie-year{font-size:11px;color:#7a6030;margin-top:2px}
.movie-genre{font-size:10px;color:#5a4820;margin-top:2px;font-style:italic}
.movie-notes{font-size:11px;color:#7a6030;margin-top:3px;line-height:1.4}
.badge{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:2px 7px;border:1px solid #1a3a4a;color:#4ab0cc}
.ptag{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;padding:2px 7px;flex-shrink:0;align-self:flex-start}
.p-high{border:1px solid #5a3a00;color:#F5C842}
.p-med{border:1px solid #2a3a00;color:#a0b840}
.p-low{border:1px solid #2a2a2a;color:#555}
.picker-pill{display:inline-block;font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;padding:2px 7px;border:1px solid #3a2f00;color:#b89a40;margin-top:4px}
.vote-count{font-size:10px;font-family:'Bebas Neue',sans-serif;color:#7a6030;margin-top:3px}
.votes-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.vchip{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:5px 10px;border:1px solid #2a1f00;color:#7a6030;cursor:pointer;background:transparent}
.vchip.voted{border-color:#E8A020;color:#F5C842;background:#1a1000}
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:9px;border-top:1px solid #1a1200;align-items:center}
.btn-g{font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 12px;cursor:pointer;background:#1a3a00;color:#7de020;border:1px solid #4a8a10}
.btn-g:active{background:#234d00}
.btn-r{font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 12px;cursor:pointer;background:#2a0a0a;color:#cc5050;border:1px solid #6a2020}
.btn-r:active{background:#3a1010}
.btn-gold{font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 12px;cursor:pointer;background:#3a2000;color:#F5C842;border:1px solid #7a5a00}
.btn-gold:active{background:#4a2c00}
.btn-subtle{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 10px;cursor:pointer;background:transparent;color:#5a4020;border:1px solid #2a1f00}
.btn-subtle:active{background:#1a1000;color:#b89a40}
.btn-subtle-r{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 10px;cursor:pointer;background:transparent;color:#4a2020;border:1px solid #2a1f00}
.btn-subtle-r:active{background:#1a0808;color:#cc5050}
.scores-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:9px}
.score-cell{background:#0a0600;border:1px solid #2a1f00;padding:7px 6px;text-align:center}
.score-cell.mine{border-width:1.5px}
.score-cell.tbd{opacity:0.55}
.score-name{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#7a6030;margin-bottom:2px}
.score-alias{font-size:8px;color:#5a4020;font-style:italic;margin-bottom:3px}
.score-input{width:100%;background:#050300;border:1px solid #3a2f00;color:#F5C842;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;text-align:center;padding:4px 2px;outline:none}
.score-input:focus{border-color:#E8A020}
.score-input.readonly{color:#555;pointer-events:none;border-color:#1a1200;background:#030200}
.score-input::placeholder{color:#2a1f00;font-size:14px}
.tbd-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#4a3820;margin-top:9px;margin-bottom:4px;border-top:1px solid #1a1200;padding-top:7px}
.avg-line{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:#F5C842;margin-top:7px}
.avg-line.empty{color:#3a2f00}
.empty-msg{text-align:center;padding:2.5rem 1rem;color:#3a2f00;font-family:'Playfair Display',serif;font-style:italic;font-size:13px}
.loading{text-align:center;padding:3rem 1rem;color:#5a4020;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px}
.form-box{background:#100800;border:1px solid #4a3500;padding:1.1rem;margin-top:.75rem}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:4px;color:#F5C842;margin-bottom:.9rem}
.field{margin-bottom:9px}
.field label{display:block;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:#7a6030;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;background:#0a0600;border:1px solid #2a1f00;color:#F9F0DC;font-family:'Special Elite',serif;font-size:14px;padding:8px 9px;outline:none;-webkit-appearance:none;border-radius:0}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#E8A020}
.field select option{background:#0a0600}
.field textarea{height:52px;resize:none}
.fetch-row{display:flex;gap:6px;align-items:flex-end;margin-bottom:9px}
.fetch-row .field{flex:1;margin-bottom:0}
.fetch-btn{padding:8px 10px;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;background:#1a1800;color:#b89a40;border:1px solid #3a3000;white-space:nowrap;flex-shrink:0}
.fetch-status{font-size:11px;color:#7a6030;font-style:italic;margin-bottom:6px}
.fetch-preview{display:flex;gap:10px;align-items:center;background:#0a0600;border:1px solid #2a1f00;padding:8px;margin-bottom:9px}
.fetch-preview img{width:36px;height:52px;object-fit:cover;border:1px solid #2a1f00;flex-shrink:0}
.fetch-preview-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#F9F0DC}
.fetch-preview-sub{font-size:10px;color:#7a6030;margin-top:2px}
.form-actions{display:flex;gap:8px;margin-top:1rem}
.fbtn{padding:10px 16px;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;cursor:pointer;border-radius:0}
.fbtn.primary{background:#3a2800;color:#F5C842;border:1px solid #7a5a00}
.fbtn.primary:active{background:#4a3400}
.fbtn.cancel{background:#1a1200;color:#7a6030;border:1px solid #2a1f00}

/* IDENTITY */
.identity-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center}
.identity-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;color:#F5C842;margin-bottom:.5rem}
.identity-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#7a6030;margin-bottom:2.5rem}
.member-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px}
.member-card{border:2px solid transparent;padding:1.1rem .9rem;cursor:pointer;text-align:center}
.member-card:active{opacity:.8}
.member-card-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:4px}
.member-card-alias{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;color:#7a6030}
.tbd-section{margin-top:1.5rem;font-size:10px;color:#4a3820;font-family:'Bebas Neue',sans-serif;letter-spacing:2px}
.tbd-cards{display:flex;gap:8px;margin-top:.6rem;justify-content:center}
.tbd-card{background:#0a0600;border:1px solid #2a1f00;padding:.7rem 1.2rem;cursor:pointer;text-align:center;opacity:.6}
.tbd-card-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#7a6030}
.tbd-card-alias{font-size:10px;color:#4a3820;font-style:italic;margin-top:2px}

/* HOME */
.personal-panel{border:1px solid transparent;padding:1rem;margin-bottom:1rem}
.personal-header{display:flex;justify-content:space-between;align-items:flex-start}
.personal-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;margin-bottom:2px}
.personal-alias{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;margin-bottom:.85rem}
.personal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.75rem}
.pstat{background:rgba(0,0,0,.3);padding:.55rem .4rem;text-align:center}
.pstat-val{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#F9F0DC}
.pstat-label{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#5a4020;margin-top:2px}
.critic-badge{display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;padding:3px 10px;margin-bottom:.6rem}
.info-banner{font-size:11px;font-family:'Special Elite',serif;font-style:italic;padding:.5rem .7rem;background:rgba(0,0,0,.3);border-left:2px solid;margin-top:.5rem;line-height:1.5}
.switch-user{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#3a2f00;cursor:pointer;text-align:right;padding:.4rem 0;margin-bottom:.25rem}
.switch-user:active{color:#7a6030}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;border:1.5px solid;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:flex-end;padding:.4rem .9rem 0;position:relative}
.film-director{font-size:10px;color:#5a4820;margin-top:2px;font-family:'Special Elite',serif}
.film-runtime{font-size:10px;color:#5a4020;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;margin-top:1px}
.film-tagline{font-size:10px;color:#7a6030;font-style:italic;margin-top:3px;line-height:1.4;font-family:'Special Elite',serif}
.expand-btn{display:flex;align-items:center;gap:6px;margin-top:10px;padding:8px 0;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;color:#7a6030;user-select:none;border-top:1px solid #1a1200}
.expand-btn:active{color:#F5C842}
.expand-arrow{font-size:8px;transition:transform .2s}
.expand-arrow.open{transform:rotate(180deg)}
.expand-panel{display:none;margin-top:10px;padding:10px;background:#080400;border:1px solid #1a1200}
.expand-panel.open{display:block}
.expand-section{margin-bottom:10px}
.expand-section:last-child{margin-bottom:0}
.expand-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#5a4020;margin-bottom:4px}
.expand-value{font-size:12px;color:#b89a40;font-family:'Special Elite',serif;line-height:1.6}
.cast-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.cast-chip{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:4px 9px;border:1px solid #2a1f00;color:#7a6030}
.unscored-card{display:flex;align-items:center;gap:10px;background:#100800;border:1px solid #2a1f00;padding:.7rem .85rem;margin-bottom:6px;cursor:pointer}
.unscored-card:active{background:#1a1000}
.unscored-poster{width:36px;height:52px;object-fit:cover;flex-shrink:0;border:1px solid #2a1f00}
.unscored-ph{width:36px;height:52px;flex-shrink:0;border:1px solid #2a1f00;background:#080400;display:flex;align-items:center;justify-content:center;font-size:16px;color:#2a1f00}
.unscored-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#F9F0DC;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unscored-prompt{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:4px 8px;border:1px solid;flex-shrink:0}
.pulse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.pulse-card{background:#100800;border:1px solid #2a1f00;position:relative}
.pulse-poster{width:100%;height:140px;object-fit:cover;display:block;border-bottom:1px solid #2a1f00}
.pulse-poster-ph{width:100%;height:140px;background:#080400;display:flex;align-items:center;justify-content:center;font-size:24px;color:#2a1f00;border-bottom:1px solid #2a1f00}
.pulse-info{padding:6px 7px;overflow:hidden}
.pulse-rank{position:absolute;top:5px;left:5px;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:2px 6px;background:rgba(0,0,0,.75)}
.pulse-title{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;color:#F9F0DC;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pulse-score{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;margin-top:2px}
.pulse-pips{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap}
.pulse-unvoted{text-align:center;padding:1.5rem;color:#3a2f00;font-family:'Playfair Display',serif;font-style:italic;font-size:12px;border:1px solid #1a1200}

/* POSTER GRID */
.poster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1.25rem}
.pgrid-item{position:relative}
.pgrid-item img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;border:1px solid #2a1f00}
.pgrid-ph{width:100%;aspect-ratio:2/3;background:#100800;border:1px solid #2a1f00;display:flex;align-items:center;justify-content:center;font-size:26px;color:#2a1f00}
.pgrid-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:18px 5px 5px}
.pgrid-title{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;color:#F9F0DC;line-height:1.2}

let state = {

  watchlist: [], watched: [], loaded: false,

};



/* ── IDENTITY ── */
function showIdentityScreen() {
  const wrap = document.getElementById('identity-wrap');
  wrap.innerHTML = `
    <div class="identity-screen">
      <div class="identity-title">Who are you?</div>
      <div class="identity-sub">Choose your seat in the screening room</div>

          <div class="member-card" data-member="${n}" style="border-color:${p.border};background:${p.bg}">
            <div class="member-card-name" style="color:${p.color}">${n}</div>

          </div>`; }).join('')}
      </div>
      <div class="tbd-section">Under Panel Review</div>
      <div class="tbd-cards">
        ${MEMBERS_TBD.map(n => { const p=PROFILES[n]; return `
          <div class="tbd-card" data-member="${n}">

            <div class="tbd-card-alias">${p.alias}</div>

function selectUser(name) {

function updateAvatar(name) {
  const el = document.getElementById('user-avatar');
  if (!el || !name) return;
  const p = PROFILES[name];
  el.textContent = name.slice(0,2).toUpperCase();

  el.style.color = p.color;
  el.style.borderColor = p.border;
  el.title = name + ' · ' + p.alias + ' · Tap to switch';
}

/* ── NAV ── */
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.tab = btn.dataset.tab;
    state.showForm = false;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (state.countdownInterval) { clearInterval(state.countdownInterval); state.countdownInterval = null; }
    render();
  });
});

/* ── FIRESTORE ── */
async function initFirestore() {
  const wSnap = await getDocs(collection(db, 'watchlist'));
  if (wSnap.empty) {
    const batch = writeBatch(db);
    SEED_WATCHLIST.forEach(m => batch.set(doc(db, 'watchlist', m.id), m));
    SEED_WATCHED.forEach(m => batch.set(doc(db, 'watched', m.id), m));
    await batch.commit();
  }
  onSnapshot(collection(db, 'watchlist'), snap => {
    state.watchlist = snap.docs.map(d => ({...d.data(), id: d.id}));
    // Assign sortOrder to any items missing it
    state.watchlist.forEach((m, i) => { if (m.sortOrder == null) m.sortOrder = i * 10; });
    if (state.loaded) render();
    fetchMissingPosters(state.watchlist, 'watchlist');
  });
  onSnapshot(collection(db, 'watched'), snap => {
    state.watched = snap.docs.map(d => ({...d.data(), id: d.id}));
    state.loaded = true;
    document.getElementById('sync-dot').classList.remove('off');
    render();
    fetchMissingPosters(state.watched, 'watched');
  });
  onSnapshot(doc(db, 'config', 'screening'), snap => {
    const prev = state.screening;
    state.screening = snap.exists() ? snap.data() : null;
    if (state.loaded) {
      // Auto-move to watched when screening expires
      if (state.screening && !prev) autoMoveToWatched();
      checkScreeningExpiry();
      render();
    }
  });
  onSnapshot(doc(db, 'config', 'membership'), snap => {
    state.membership = snap.exists() ? snap.data() : {votes:{}};
    if (state.loaded) render();
  });
  onSnapshot(doc(db, 'config', 'dateRequests'), snap => {
    state.dateRequests = snap.exists() ? snap.data() : {requests:{}};
    if (state.loaded) render();
  });
}

async function fetchMissingPosters(movies, coll) {
  for (const m of movies) {
    if (m.poster && m.director && m.cast) continue;
    try {
      const r = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(m.title)}&language=en-US&page=1`);
      const d = await r.json();
      const hit = d.results && d.results[0];
      if (!hit) continue;
      const updates = {};
      if (hit.poster_path) updates.poster = TMDB_IMG + hit.poster_path;
      if (!m.year && hit.release_date) updates.year = hit.release_date.slice(0,4);
      if (!m.tmdb && hit.vote_average) updates.tmdb = hit.vote_average.toFixed(1);
      try {
        const dr = await fetch(`https://api.themoviedb.org/3/movie/${hit.id}?api_key=${TMDB_KEY}&language=en-US&append_to_response=credits`);
        const dd = await dr.json();
        if (!m.genre && dd.genres && dd.genres.length) updates.genre = dd.genres[0].name;
        if (!m.director || m.director === '') {
          const dir = dd.credits && dd.credits.crew && dd.credits.crew.find(c=>c.job==='Director');
          if (dir) updates.director = dir.name;
        }
        if (!m.runtime) updates.runtime = dd.runtime || null;
        if (!m.tagline || m.tagline === '') updates.tagline = dd.tagline || '';
        if (!m.overview && dd.overview) updates.overview = dd.overview;
        if (!m.cast && dd.credits && dd.credits.cast) {
          updates.cast = dd.credits.cast.slice(0,4).map(a=>a.name).join(', ');
        }
      } catch(e){}
      if (Object.keys(updates).length) await updateDoc(doc(db, coll, m.id), updates);
    } catch(e){}
  }
}

/* ── RENDER ── */
function render() {
  const c = document.getElementById('content');
  if (!state.loaded) { c.innerHTML = `<div class="loading">Connecting...</div>`; return; }
  if (state.showForm === 'add-movie') { c.innerHTML = buildAddMovieForm(); bindForm(); return; }
  if (state.showForm === 'schedule')  { c.innerHTML = buildScheduleForm(); bindScheduleForm(); return; }
  if (state.showForm === 'edit')      { c.innerHTML = buildEditForm(); bindEditForm(); return; }
  if (state.showForm === 'summary')   { c.innerHTML = buildSummary(); bindSummary(); return; }
  if (state.tab === 'home')       c.innerHTML = buildHome();
  else if (state.tab === 'screening') c.innerHTML = buildScreening();
  else if (state.tab === 'watchlist') c.innerHTML = buildWatchlist();
  else c.innerHTML = buildWatched();
  bindEvents();
  if (state.tab === 'screening' && state.screening) startCountdown();
}

function bindEvents() {
  document.getElementById('add-btn')?.addEventListener('click', () => { state.showForm='add-movie'; render(); });

  document.getElementById('user-avatar')?.addEventListener('click', () => {
    if (confirm('Switch member? Current: ' + state.currentUser)) {
      localStorage.removeItem('cmc_user');
      if (state.countdownInterval) clearInterval(state.countdownInterval);
      document.getElementById('main-app').style.display = 'none';

      document.getElementById('header-top') && (document.getElementById('header-top').style.display='none');

    }
  });

  document.getElementById('submit-req-btn')?.addEventListener('click', () => {

    });

  document.getElementById('clear-screening-btn')?.addEventListener('click', clearScreening);
  document.querySelectorAll('[data-interest-id]').forEach(el => {
    el.addEventListener('click', () => castInterestVote(el.dataset.interestId, parseInt(el.dataset.interestVal)));
  });
  document.querySelectorAll('.rsvp-yes,.rsvp-no').forEach(el => {
    el.addEventListener('click', () => setRsvp(el.dataset.member, el.classList.contains('rsvp-yes') ? 'yes' : 'no'));

  document.getElementById('show-summary-btn')?.addEventListener('click', e => {

  document.querySelectorAll('[data-panel-vote]').forEach(el => {

  document.querySelectorAll('[data-promote]').forEach(el => {
    el.addEventListener('click', () => promoteCandidate(el.dataset.promote));
  });
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', () => {
      const {action,id} = el.dataset;
      if (action==='watched')               moveToWatched(id);
      if (action==='move-back')             moveBackToWatch(id);
      if (action==='edit-watch')            openEdit(id);
      if (action==='confirm-remove-watch')  showConfirm(id,'watchlist');
      if (action==='confirm-remove-watched')showConfirm(id,'watched');
      if (action==='go-watched')            { state.tab='watched'; document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===3)); render(); }
      if (action==='go-watchlist')          { state.tab='watchlist'; document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===2)); render(); }

/* ── HELPERS ── */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getCriticBadge(avg, count) {
  if (count < 2) return 'Unproven';
  if (avg >= 8.5) return 'The Optimist';
  if (avg <= 5.5) return 'The Hardliner';
  if (avg >= 7.5) return 'The Enthusiast';
  if (avg >= 6.5) return 'The Measured';
  return 'The Realist';
}
function isLive() {
  if (!state.screening || !state.screening.showtime) return false;
  return Date.now() >= new Date(state.screening.showtime).getTime();
}
function isExpired() {
  if (!state.screening || !state.screening.showtime) return false;
  const showtime = new Date(state.screening.showtime).getTime();
  return Date.now() >= showtime + (4 * 60 * 60 * 1000); // 4 hours after showtime
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
}
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}

function startCountdown() {
  if (state.countdownInterval) clearInterval(state.countdownInterval);
  function tick() {
    if (!state.screening) return;
    const now  = Date.now();
    const show = new Date(state.screening.showtime).getTime();
    const diff = show - now;
    if (diff <= 0) { clearInterval(state.countdownInterval); render(); return; }
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    const pad = n => String(n).padStart(2,'0');
    const dEl=document.getElementById('cd-d'), hEl=document.getElementById('cd-h'),
          mEl=document.getElementById('cd-m'), sEl=document.getElementById('cd-s');
    if (dEl) dEl.textContent=d;
    if (hEl) hEl.textContent=pad(h);
    if (mEl) mEl.textContent=pad(m);
    if (sEl) sEl.textContent=pad(s);
  }
  tick();
  state.countdownInterval = setInterval(tick, 1000);
}

/* interest vote helpers */
const INTEREST_LEVELS = [
  {val:4, label:'Must See',    cls:'v4'},
  {val:3, label:'Want to See', cls:'v3'},
  {val:2, label:'Maybe',       cls:'v2'},
  {val:1, label:'Pass',        cls:'v1'},
];
function getInterestScore(m) {
  const iv = m.interestVotes || {};
  const vals = ALL_MEMBERS.map(n => iv[n]).filter(v => v > 0);
  if (!vals.length) return 0;
  return vals.reduce((a,b)=>a+b,0) / vals.length;
}
function getInterestLabel(score) {
  if (score >= 3.5) return 'Must Screen';
  if (score >= 2.5) return 'Want to See';
  if (score >= 1.5) return 'Maybe';
  if (score >  0)   return 'Low Interest';
  return 'Unvoted';
}

function buildWatchlist() {
  const u = state.currentUser;
  // Pin next screening to top, sort rest by interest score
  const nextId = state.screening ? state.screening.movieId : null;
  const sorted = [...state.watchlist].sort((a,b) => {
    if (a.id === nextId) return -1;
    if (b.id === nextId) return 1;
    const sa = getInterestScore(a);
    const sb = getInterestScore(b);
    if (sb !== sa) return sb - sa;
    return (a.sortOrder||0) - (b.sortOrder||0);
  });

  let html=`<button class="add-btn" id="add-btn">+ Add to the Roster</button>`;
  if (!sorted.length) return html+`<div class="empty-msg">The screening room awaits its first selection.</div>`;

  sorted.forEach(m => {
    const pickerP = PROFILES[m.picker]||PROFILES['Chris'];
    const isNext  = state.screening && state.screening.movieId === m.id;
    const sc = state.screening;
    const iv      = m.interestVotes || {};
    const myVote  = iv[u] || 0;
    const score   = getInterestScore(m);
    const scoreLabel = getInterestLabel(score);
    const isHot   = score >= 3.5;

    // pip row — one pip per member showing their vote level
    const pips = ALL_MEMBERS.map(n => {
      const v = iv[n];
      const cls = v===4?'v4':v===3?'v3':v===2?'v2':v===1?'v1':'none';
      return `<span class="vote-pip ${cls}" title="${n}: ${v?INTEREST_LEVELS.find(l=>l.val===v)?.label||'?':'No vote'}"></span>`;
    }).join('');

    html+=`<div class="card"${isNext?` style="border-color:#5a3a00"`:''}>
      ${isNext?`<div style="font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:#F5C842;margin-bottom:8px;display:flex;align-items:center;gap:8px">
        <span style="animation:pulse 1.5s ease-in-out infinite;display:inline-block">▶</span>
        <span>Next Screening</span>
        ${sc&&sc.showtime?`<span style="color:#b89a40;font-size:10px;letter-spacing:2px">· ${formatDate(sc.showtime)} · Showtime ${formatTime(sc.showtime)}</span>`:''}
      </div>`:''}
      <div class="card-top">
        ${m.poster?`<img class="poster" src="${m.poster}" alt="${esc(m.title)}" loading="lazy"/>`:`<div class="poster-ph">🎬</div>`}
        <div class="card-meta">

          ${m.year?`<div class="movie-year">${m.year}</div>`:''}

          ${m.director?`<div class="film-director">Dir. ${esc(m.director)}${m.runtime?' · '+m.runtime+'m':''}</div>`:''}
          ${m.tagline?`<div class="film-tagline">${esc(m.tagline)}</div>`:''}

          <div class="vote-score-wrap">

          </div>
          ${buildExpandPanel(m)}
        </div>
      </div>
      <div class="interest-row">
        <div class="interest-header">
          <div class="interest-label">Your Interest</div>
          <div class="interest-status" style="color:${myVote===4?'#E8A020':myVote===3?'#90c830':myVote===2?'#4090c0':myVote===1?'#c06060':'#3a2f00'}">${myVote?INTEREST_LEVELS.find(l=>l.val===myVote)?.label+' ✓':'Not voted'}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          ${buildInterestGrid(m.id, myVote)}
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-r" data-action="confirm-remove-watch" data-id="${m.id}">Remove</button>
      </div>
    </div>`;
  });
  return html;
}

/* ── WATCHED ── */
function buildWatched() {
  const u = state.currentUser;
  if (!state.watched.length) return `<div class="empty-msg">No screenings on record yet.</div>`;
  return [...state.watched].reverse().map(m=>{
    const r=m.ratings||{};
    const vals=MEMBERS.map(n=>r[n]).filter(v=>v>0);
    const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
    const pickerP=PROFILES[m.picker]||PROFILES['Chris'];
    return `<div class="card">
      <div class="card-top">
        ${m.poster?`<img class="poster" src="${m.poster}" alt="${esc(m.title)}" loading="lazy"/>`:`<div class="poster-ph">🎬</div>`}
        <div class="card-meta">
          <div class="movie-title">${esc(m.title)}</div>
          ${m.year?`<div class="movie-year">${m.year}</div>`:''}
          ${m.genre?`<div class="movie-genre">${m.genre}</div>`:''}
          ${m.director?`<div class="film-director">Dir. ${esc(m.director)}${m.runtime?' · '+m.runtime+'m':''}</div>`:''}
          ${m.tagline?`<div class="film-tagline">${esc(m.tagline)}</div>`:''}
          <div class="picker-pill" style="border-color:${pickerP.border};color:${pickerP.color}">${m.picker}'s pick</div>
          <div class="avg-line${avg?'':' empty'}" id="avg-${m.id}">${avg?'Club Avg: '+avg+' / 10':'No scores yet'}</div>
          ${m.tmdb?`<div style="margin-top:4px"><span class="badge">TMDB ${m.tmdb}</span></div>`:''}
          ${buildExpandPanel(m)}
        </div>
      </div>
      <div class="scores-grid">
        ${MEMBERS.map(n=>{
          const np=PROFILES[n]; const isMe=n===u;
          return `<div class="score-cell${isMe?' mine':''}" style="${isMe?`border-color:${np.color};background:${np.bg}`:''}">
            <div class="score-name" style="${isMe?`color:${np.color}`:''}\">${n}</div>
            <div class="score-alias" style="${isMe?`color:${np.color}`:'color:#3a2f00'}">${np.alias}</div>
            <input class="score-input${isMe?'':' readonly'}" type="number" min="1" max="10"
              inputmode="numeric" placeholder="—" value="${r[n]||''}"
              data-id="${m.id}" data-member="${n}" ${isMe?'':'readonly'}/>
          </div>`;
        }).join('')}
      </div>
      <div class="tbd-label">Under Panel Review</div>
      <div class="scores-grid">
        ${MEMBERS_TBD.map(n=>{
          const np=PROFILES[n]; const isMe=n===u;
          return `<div class="score-cell tbd${isMe?' mine':''}" style="${isMe?`border-color:${np.color};background:${np.bg};opacity:1`:''}">
            <div class="score-name tbd" style="${isMe?`color:${np.color}`:''}\">${n}</div>
            <input class="score-input tbd${isMe?'':' readonly'}" type="number" min="1" max="10"
              inputmode="numeric" placeholder="—" value="${r[n]||''}"
              data-id="${m.id}" data-member="${n}" ${isMe?'':'readonly'}/>
          </div>`;
        }).join('')}
      </div>
      ${buildCommentsSection(m, u)}
      <div class="card-actions">
        <button class="btn-gold" data-action="view-summary" data-id="${m.id}">View Summary</button>
        <button class="btn-r" data-action="confirm-remove-watched" data-id="${m.id}">Remove</button>
      </div>
    </div>`;
  }).join('');
}

/* ── ADD MOVIE FORM ── */
function buildAddMovieForm() {
  const fd=state.fd;
  return `<div class="form-box">
    <div class="form-title">Add to the Roster</div>
    <div class="fetch-row">
      <div class="field"><label>Title</label>
        <input id="f-title" placeholder="Film title" value="${esc(fd.title||'')}"/>
      </div>
      <button class="fetch-btn" id="fetch-btn">Fetch ↗</button>
    </div>
    ${fd.status?`<div class="fetch-status">${fd.status}</div>`:''}
    ${fd.poster?`<div class="fetch-preview">
      <img src="${fd.poster}" alt="poster"/>
      <div>
        <div class="fetch-preview-title">${esc(fd.title||'')}</div>
        <div class="fetch-preview-sub">${fd.year||''}${fd.genre?' · '+fd.genre:''}</div>
        ${fd.tmdb?`<div class="fetch-preview-sub">TMDB ${fd.tmdb}</div>`:''}
      </div>
    </div>`:''}
    <div class="field"><label>Year</label>
      <input id="f-year" type="number" inputmode="numeric" placeholder="1984" value="${esc(fd.year||'')}"/>
    </div>
    <input type="hidden" id="f-picker" value="${state.currentUser}"/>
    <div class="field"><label>Priority</label>
      <select id="f-priority">
        <option value="high"${(fd.priority||'high')==='high'?' selected':''}>Must Screen</option>
        <option value="med"${fd.priority==='med'?' selected':''}>Next Up</option>
        <option value="low"${fd.priority==='low'?' selected':''}>On the Docket</option>
      </select>
    </div>
    <div class="field"><label>Notes</label>
      <textarea id="f-notes" placeholder="Brief synopsis or notes">${esc(fd.notes||'')}</textarea>
    </div>
    <div class="form-actions">
      <button class="fbtn primary" id="submit-btn">Add Film</button>
      <button class="fbtn cancel" id="cancel-btn">Cancel</button>
    </div>
  </div>`;
}


/* ── BOOT ── */
const saved=localStorage.getItem('cmc_user');
if(saved&&PROFILES[saved]){
  state.currentUser=saved;
  document.getElementById('main-app').style.display='block';
  document.getElementById('bottom-nav').style.display='flex';
  updateAvatar(saved);
  initFirestore();
}else{
  showIdentityScreen();
}
</script>
</body>
</html>
