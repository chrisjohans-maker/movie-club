<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chris's Movie Club</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0A0500;font-family:'Special Elite',serif;color:#F9F0DC;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.header{text-align:center;padding:1.25rem 1rem .9rem;border-bottom:1px solid #2a1f00}
.bulb-row{display:flex;justify-content:center;gap:14px;margin-bottom:8px}
.bulb{width:9px;height:9px;border-radius:50%;background:#FFF8C0;box-shadow:0 0 5px 2px #FFF8C0,0 0 12px 4px #FFD700;animation:blink 1.1s step-end infinite}
.bulb.off{animation:blinkoff 1.1s step-end infinite}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.15}}
@keyframes blinkoff{0%,49%{opacity:.15}50%,100%{opacity:1}}
.club-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:5px;color:#F5C842;text-shadow:0 0 16px rgba(245,200,66,.45)}
.club-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:#b89a40;margin-top:1px}
.members-line{font-size:10px;color:#7a6030;letter-spacing:2px;margin-top:5px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#080400;border-top:1px solid #2a1f00;display:flex;z-index:100}
.nav-btn{flex:1;padding:12px 4px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:#5a4020;cursor:pointer;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.active{color:#F5C842}
.nav-icon{font-size:18px;line-height:1}
.content{padding:.9rem}
.add-btn{width:100%;padding:11px;background:transparent;border:1px solid #3a2f00;color:#b89a40;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;cursor:pointer;margin-bottom:1rem;display:block}
.add-btn:active{background:#1a1000}
.section-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:#7a6030;margin:1rem 0 .5rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#2a1f00}
.card{background:#100800;border:1px solid #2a1f00;padding:.85rem .9rem;margin-bottom:8px}
.card-top{display:flex;gap:10px;margin-bottom:6px}
.poster{width:52px;height:76px;object-fit:cover;flex-shrink:0;border:1px solid #2a1f00;background:#080400}
.poster-ph{width:52px;height:76px;flex-shrink:0;border:1px solid #2a1f00;background:#080400;display:flex;align-items:center;justify-content:center;font-size:22px;color:#2a1f00}
.card-meta{flex:1;min-width:0}
.movie-title{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;color:#F9F0DC;line-height:1.3}
.movie-year{font-size:11px;color:#7a6030;margin-top:2px}
.movie-genre{font-size:10px;color:#5a4820;margin-top:2px;font-style:italic}
.movie-notes{font-size:11px;color:#7a6030;margin-top:3px;line-height:1.4}
.omdb-scores{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.badge{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:2px 7px;border:1px solid #2a1f00;color:#7a6030}
.badge.tmdb{border-color:#1a3a4a;color:#4ab0cc}
.badge.imdb{border-color:#4a4000;color:#b89a00}
.ptag{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;padding:2px 7px;flex-shrink:0;align-self:flex-start}
.p-high{border:1px solid #5a3a00;color:#F5C842}
.p-med{border:1px solid #2a3a00;color:#a0b840}
.p-low{border:1px solid #2a2a2a;color:#555}
.picker-pill{display:inline-block;font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;padding:2px 7px;border:1px solid #3a2f00;color:#b89a40;margin-top:4px}
.vote-count{font-size:10px;font-family:'Bebas Neue',sans-serif;color:#7a6030;margin-top:3px}
.votes-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.vchip{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:5px 10px;border:1px solid #2a1f00;color:#7a6030;cursor:pointer;background:transparent}
.vchip.voted{border-color:#E8A020;color:#F5C842;background:#1a1000}
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:9px;border-top:1px solid #1a1200;flex-wrap:wrap}
.btn-g{font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 12px;cursor:pointer;background:#1a3a00;color:#7de020;border:1px solid #4a8a10}
.btn-g:active{background:#234d00}
.btn-r{font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 12px;cursor:pointer;background:#2a0a0a;color:#cc5050;border:1px solid #6a2020}
.btn-r:active{background:#3a1010}
.scores-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:9px}
.score-cell{background:#0a0600;border:1px solid #2a1f00;padding:7px 6px;text-align:center}
.score-cell.tbd{opacity:0.55}
.score-name{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#7a6030;margin-bottom:4px}
.score-name.tbd{color:#4a3820}
.score-input{width:100%;background:#050300;border:1px solid #3a2f00;color:#F5C842;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;text-align:center;padding:4px 2px;outline:none}
.score-input:focus{border-color:#E8A020}
.score-input.tbd{color:#7a6030}
.score-input::placeholder{color:#2a1f00;font-size:14px}
.tbd-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#4a3820;margin-top:9px;margin-bottom:4px;border-top:1px solid #1a1200;padding-top:7px}
.avg-line{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:#F5C842;margin-top:7px}
.avg-line.empty{color:#3a2f00}
.empty-msg{text-align:center;padding:2.5rem 1rem;color:#3a2f00;font-family:'Playfair Display',serif;font-style:italic;font-size:13px}
.form-box{background:#100800;border:1px solid #4a3500;padding:1.1rem;margin-top:.75rem}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:4px;color:#F5C842;margin-bottom:.9rem}
.field{margin-bottom:9px}
.field label{display:block;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:#7a6030;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;background:#0a0600;border:1px solid #2a1f00;color:#F9F0DC;font-family:'Special Elite',serif;font-size:14px;padding:8px 9px;outline:none;-webkit-appearance:none;border-radius:0}
.field input:focus,.field textarea:focus{border-color:#E8A020}
.field select option{background:#0a0600}
.field textarea{height:52px;resize:none}
.fetch-row{display:flex;gap:6px;align-items:flex-end;margin-bottom:9px}
.fetch-row .field{flex:1;margin-bottom:0}
.fetch-btn{padding:8px 10px;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;background:#1a1800;color:#b89a40;border:1px solid #3a3000;white-space:nowrap;flex-shrink:0}
.fetch-status{font-size:11px;color:#7a6030;font-style:italic;margin-bottom:6px}
.fetch-preview{display:flex;gap:10px;align-items:center;background:#0a0600;border:1px solid #2a1f00;padding:8px;margin-bottom:9px}
.fetch-preview img{width:36px;height:52px;object-fit:cover;border:1px solid #2a1f00;flex-shrink:0}
.fetch-preview-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#F9F0DC}
.fetch-preview-sub{font-size:10px;color:#7a6030;margin-top:2px}
.form-actions{display:flex;gap:8px;margin-top:1rem}
.fbtn{padding:10px 16px;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;cursor:pointer;border-radius:0}
.fbtn.primary{background:#3a2800;color:#F5C842;border:1px solid #7a5a00}
.fbtn.primary:active{background:#4a3400}
.fbtn.cancel{background:#1a1200;color:#7a6030;border:1px solid #2a1f00}
.dash-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.stat-card{background:#100800;border:1px solid #2a1f00;padding:.85rem .9rem}
.stat-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;color:#5a4020;margin-bottom:4px}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#F5C842;line-height:1}
.stat-sub{font-size:10px;color:#5a4020;margin-top:3px}
.poster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1.25rem}
.pgrid-item{position:relative}
.pgrid-item img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;border:1px solid #2a1f00}
.pgrid-ph{width:100%;aspect-ratio:2/3;background:#100800;border:1px solid #2a1f00;display:flex;align-items:center;justify-content:center;font-size:26px;color:#2a1f00}
.pgrid-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:18px 5px 5px}
.pgrid-title{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;color:#F9F0DC;line-height:1.2}
.pgrid-avg{font-size:10px;color:#F5C842;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1a1200}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#3a2f00;width:22px;flex-shrink:0;text-align:center}
.lb-rank.gold{color:#F5C842}.lb-rank.silver{color:#888}.lb-rank.bronze{color:#8B5E3C}
.lb-info{flex:1;min-width:0}
.lb-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#F9F0DC;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-sub{font-size:10px;color:#7a6030;margin-top:1px}
.lb-score{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#F5C842;flex-shrink:0}
.member-avgs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mavg-card{background:#100800;border:1px solid #2a1f00;padding:.7rem .8rem}
.mavg-name{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:#7a6030}
.mavg-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#F9F0DC;margin-top:2px}
.mavg-sub{font-size:10px;color:#5a4020;margin-top:1px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="bulb-row" id="bulbs-top"></div>
    <div class="club-title">Chris's Movie Club</div>
    <div class="club-sub">The Premier Movie Going Experience at the Pinnacle</div>
    <div class="members-line">Chris · Robert · Lindsey · Charlie</div>
    <div class="members-line" style="margin-top:3px;font-size:9px;color:#4a3820;font-style:italic">Under Panel Review: Jason · +1</div>
    <div class="bulb-row" id="bulbs-bot"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" data-tab="dashboard"><span class="nav-icon">◈</span>Dashboard</button>
  <button class="nav-btn" data-tab="watchlist"><span class="nav-icon">◎</span>To Watch</button>
  <button class="nav-btn" data-tab="watched"><span class="nav-icon">✦</span>Watched</button>
</div>

<script>
const TMDB_KEY = '02f99115d00fd3bfe5702b1c133ec1a3';
const TMDB_IMG  = 'https://image.tmdb.org/t/p/w300';
function tmdbUrl(path, params='') { return `https://api.themoviedb.org/3${path}?api_key=${TMDB_KEY}&language=en-US${params}`; }

const MEMBERS     = ['Chris','Robert','Lindsey','Charlie'];
const MEMBERS_TBD = ['Jason','+1'];

const state = {
  tab: 'dashboard',
  showForm: false,
  fd: {},
  watchlist: [
    {id:1, title:'This Is Spinal Tap',              year:'1984', picker:'Chris', notes:'', priority:'high', votes:{}, poster:'https://image.tmdb.org/t/p/w300/fWgHGiGQfBL1S8AJxMkBWBLBIbn.jpg', genre:'Comedy', tmdb:'7.8'},
    {id:2, title:'All That Jazz',                   year:'1979', picker:'Chris', notes:'', priority:'high', votes:{}, poster:'https://image.tmdb.org/t/p/w300/hRj3tKXHCOAGBIHIU2jNqMNLUvb.jpg', genre:'Drama', tmdb:'7.7'},
    {id:3, title:'The Stuff',                       year:'1985', picker:'Chris', notes:'', priority:'med',  votes:{}, poster:'https://image.tmdb.org/t/p/w300/A1EUnvmFMrmgWdWmr7cEVwO0QTO.jpg', genre:'Horror', tmdb:'5.9'},
    {id:4, title:'Days of Heaven',                  year:'1978', picker:'Chris', notes:'', priority:'med',  votes:{}, poster:'https://image.tmdb.org/t/p/w300/7INfnGLqsPhBUQ3Vg8fWFVFXBpx.jpg', genre:'Drama', tmdb:'7.7'},
    {id:5, title:'Playtime',                        year:'1967', picker:'Chris', notes:'', priority:'med',  votes:{}, poster:'https://image.tmdb.org/t/p/w300/fO3xMHmVzSIjpPP1rHWJASFEMzl.jpg', genre:'Comedy', tmdb:'7.8'},
    {id:6, title:'The Worst Person in the World',   year:'2021', picker:'Chris', notes:'', priority:'med',  votes:{}, poster:'https://image.tmdb.org/t/p/w300/48Wkp1VhxHFnWnXgy3sqkAlnFzR.jpg', genre:'Romance', tmdb:'7.8'},
    {id:7, title:'Seconds',                         year:'1966', picker:'Chris', notes:'', priority:'low',  votes:{}, poster:'https://image.tmdb.org/t/p/w300/7Lp1WGLgcDRJxuFiqDrpeyJG89d.jpg', genre:'Thriller', tmdb:'7.5'},
    {id:8, title:"Don't Look Now",                  year:'1973', picker:'Chris', notes:'', priority:'low',  votes:{}, poster:'https://image.tmdb.org/t/p/w300/a4AQWbPLtQz7UkNmrUm7lbPLEce.jpg', genre:'Horror', tmdb:'7.4'},
    {id:9, title:'Charade',                         year:'1963', picker:'Chris', notes:'', priority:'low',  votes:{}, poster:'https://image.tmdb.org/t/p/w300/nBEVQBhGBaF4HmGHbQcCCW27FVk.jpg', genre:'Comedy', tmdb:'7.7'},
    {id:10,title:'Boy on a Dolphin',                year:'1957', picker:'Chris', notes:'', priority:'low',  votes:{}, poster:'https://image.tmdb.org/t/p/w300/ekB1A5YGFKZCH5pKDGvB2aBBXla.jpg', genre:'Adventure', tmdb:'5.5'},
    {id:11,title:'A Girl in Black',                 year:'1956', picker:'Chris', notes:'', priority:'low',  votes:{}, poster:'https://image.tmdb.org/t/p/w300/b9K7kIWREBIg2UFOGvnXkuPEhbj.jpg', genre:'Drama', tmdb:'7.0'},
  ],
  watched: [
    {id:12,title:'Down by Law',                          year:'1986', picker:'Chris', ratings:{}, poster:'https://image.tmdb.org/t/p/w300/f42PfXPo8kPKIXaHfBfGFiZtHgu.jpg', genre:'Crime', tmdb:'7.8'},
    {id:13,title:'Anselm',                               year:'2023', picker:'Chris', ratings:{}, poster:'https://image.tmdb.org/t/p/w300/cGSZqr9bPrPAHdVpXiGqTHnBjhI.jpg', genre:'Documentary', tmdb:'7.0'},
    {id:14,title:'Videodrome',                           year:'1983', picker:'Chris', ratings:{}, poster:'https://image.tmdb.org/t/p/w300/3bXNjf4KFi8P2fOHlI3Ah7Hy9BM.jpg', genre:'Horror', tmdb:'7.1'},
    {id:15,title:'The Taking of Pelham One Two Three',   year:'1974', picker:'Chris', ratings:{}, poster:'https://image.tmdb.org/t/p/w300/cYWbTHZ0jYKVJNGBAbYR5qeNBIU.jpg', genre:'Thriller', tmdb:'7.5'},
    {id:16,title:'Rushmore',                             year:'1998', picker:'Chris', ratings:{}, poster:'https://image.tmdb.org/t/p/w300/paDt4MnGjGHnGMIrIBxWeFLAsmI.jpg', genre:'Comedy', tmdb:'7.5'},
  ],
  nextId: 30
};

/* ── BULBS ── */
function makeBulbs(id, n) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = Array.from({length:n}, (_,i) => `<span class="bulb${i%2?' off':''}"></span>`).join('');
}
makeBulbs('bulbs-top', 10);
makeBulbs('bulbs-bot', 10);

/* ── NAV ── */
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.tab = btn.dataset.tab;
    state.showForm = false;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

/* ── RENDER ── */
function render() {
  const c = document.getElementById('content');
  if (state.showForm) { c.innerHTML = buildForm(); bindForm(); return; }
  if (state.tab === 'dashboard') c.innerHTML = buildDashboard();
  else if (state.tab === 'watchlist') c.innerHTML = buildWatchlist();
  else c.innerHTML = buildWatched();
  bindEvents();
}

function bindEvents() {
  const addBtn = document.getElementById('add-btn');
  if (addBtn) addBtn.addEventListener('click', openForm);

  document.querySelectorAll('.vchip').forEach(el => {
    el.addEventListener('click', () => toggleVote(+el.dataset.id, el.dataset.member));
  });

  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', () => {
      const {action, id} = el.dataset;
      if (action === 'watched')        moveToWatched(+id);
      if (action === 'remove-watch')   del(+id, 'watchlist');
      if (action === 'remove-watched') del(+id, 'watched');
    });
  });

  document.querySelectorAll('.score-input').forEach(el => {
    el.addEventListener('input', () => saveScore(+el.dataset.id, el.dataset.member, el.value));
  });
}

function bindForm() {
  document.getElementById('fetch-btn')  ?.addEventListener('click', fetchTMDB);
  document.getElementById('submit-btn') ?.addEventListener('click', submitAdd);
  document.getElementById('cancel-btn') ?.addEventListener('click', closeForm);
}

/* ── TMDB FETCH ── */
async function fetchTMDB() {
  const titleEl = document.getElementById('f-title');
  const title = (titleEl ? titleEl.value : '').trim();
  if (!title) return;
  state.fd.title = title;
  state.fd.status = 'Fetching…';
  render();
  try {
    const searchRes = await fetch(
      tmdbUrl('/search/movie', `&query=${encodeURIComponent(title)}&page=1`)
    );
    const searchData = await searchRes.json();
    const movie = searchData.results && searchData.results[0];
    if (movie) {
      state.fd.poster   = movie.poster_path ? TMDB_IMG + movie.poster_path : null;
      state.fd.year     = movie.release_date ? movie.release_date.slice(0,4) : '';
      state.fd.tmdb     = movie.vote_average ? movie.vote_average.toFixed(1) : null;
      state.fd.tmdb_id  = movie.id;
      if (!state.fd.notes && movie.overview) state.fd.notes = movie.overview.slice(0,90) + (movie.overview.length > 90 ? '…' : '');
      /* fetch genres from detail endpoint */
      try {
        const detailRes = await fetch(
          tmdbUrl(`/movie/${movie.id}`)
        );
        const detail = await detailRes.json();
        state.fd.genre = detail.genres && detail.genres.length ? detail.genres[0].name : '';
      } catch(e) {}
      state.fd.status = '';
    } else {
      state.fd.status = 'Not found — check spelling or add manually.';
    }
  } catch(e) {
    state.fd.status = 'Fetch failed. Check connection.';
  }
  render();
}

/* ── AUTO-FETCH ALL MOVIES ON LOAD ── */
async function autoFetch() {
  const all = [...state.watchlist, ...state.watched];
  for (const m of all) {
    if (m.poster) continue;
    try {
      const res = await fetch(
        tmdbUrl('/search/movie', `&query=${encodeURIComponent(m.title)}&page=1`)
      );
      const data = await res.json();
      const movie = data.results && data.results[0];
      if (movie) {
        if (movie.poster_path)   m.poster = TMDB_IMG + movie.poster_path;
        if (!m.year && movie.release_date) m.year = movie.release_date.slice(0,4);
        if (!m.tmdb && movie.vote_average) m.tmdb = movie.vote_average.toFixed(1);
        try {
          const dr = await fetch(
            tmdbUrl(`/movie/${movie.id}`)
          );
          const dd = await dr.json();
          if (!m.genre && dd.genres && dd.genres.length) m.genre = dd.genres[0].name;
        } catch(e) {}
        render();
      }
    } catch(e) {}
  }
}

/* ── DASHBOARD ── */
function buildDashboard() {
  const w = state.watched;
  const allAvgs = w.map(m => {
    const v = MEMBERS.map(n => m.ratings && m.ratings[n]).filter(x => x > 0);
    return v.length ? v.reduce((a,b) => a+b, 0) / v.length : null;
  }).filter(x => x !== null);
  const clubAvg = allAvgs.length ? (allAvgs.reduce((a,b) => a+b, 0) / allAvgs.length).toFixed(1) : '—';

  const ranked = [...w].map(m => {
    const v = MEMBERS.map(n => m.ratings && m.ratings[n]).filter(x => x > 0);
    return {...m, avg: v.length ? v.reduce((a,b)=>a+b,0)/v.length : 0};
  }).filter(m => m.avg > 0).sort((a,b) => b.avg - a.avg);

  const mStats = MEMBERS.map(n => {
    const s = w.map(m => m.ratings && m.ratings[n]).filter(x => x > 0);
    return {name:n, avg: s.length ? (s.reduce((a,b)=>a+b,0)/s.length).toFixed(1) : '—', count: s.length};
  });

  const recent = [...w].reverse().slice(0,6);

  return `
    <div class="dash-stats">
      <div class="stat-card"><div class="stat-label">Screened</div><div class="stat-val">${w.length}</div><div class="stat-sub">films watched</div></div>
      <div class="stat-card"><div class="stat-label">Club Avg</div><div class="stat-val">${clubAvg}</div><div class="stat-sub">out of 10</div></div>
      <div class="stat-card"><div class="stat-label">Queue</div><div class="stat-val">${state.watchlist.length}</div><div class="stat-sub">films to watch</div></div>
      <div class="stat-card"><div class="stat-label">Members</div><div class="stat-val">${MEMBERS.length}</div><div class="stat-sub">+ 2 under review</div></div>
    </div>
    ${recent.length ? `
      <div class="section-label">Recent Screenings</div>
      <div class="poster-grid">
        ${recent.map(m => {
          const v = MEMBERS.map(n => m.ratings && m.ratings[n]).filter(x => x > 0);
          const avg = v.length ? (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1) : null;
          return `<div class="pgrid-item">
            ${m.poster ? `<img src="${m.poster}" alt="${esc(m.title)}" loading="lazy"/>` : `<div class="pgrid-ph">🎬</div>`}
            <div class="pgrid-overlay">
              <div class="pgrid-title">${esc(m.title)}</div>
              ${avg ? `<div class="pgrid-avg">${avg}/10</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>` : ''}
    ${ranked.length ? `
      <div class="section-label">Top Rated</div>
      <div>${ranked.slice(0,5).map((m,i) => `
        <div class="lb-row">
          <div class="lb-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div>
          <div class="lb-info">
            <div class="lb-title">${esc(m.title)}</div>
            <div class="lb-sub">${m.year||''} · ${m.picker}'s pick</div>
          </div>
          <div class="lb-score">${m.avg.toFixed(1)}</div>
        </div>`).join('')}
      </div>` : ''}
    ${mStats.some(s => s.count > 0) ? `
      <div class="section-label" style="margin-top:1.25rem">Member Averages</div>
      <div class="member-avgs">
        ${mStats.map(s => `<div class="mavg-card">
          <div class="mavg-name">${s.name}</div>
          <div class="mavg-val">${s.avg}</div>
          <div class="mavg-sub">${s.count} film${s.count!==1?'s':''} rated</div>
        </div>`).join('')}
      </div>` : ''}
  `;
}

/* ── WATCHLIST ── */
function buildWatchlist() {
  const sorted = [...state.watchlist].sort((a,b) => {
    const po = {high:0, med:1, low:2};
    if (po[a.priority] !== po[b.priority]) return po[a.priority] - po[b.priority];
    return Object.keys(b.votes||{}).length - Object.keys(a.votes||{}).length;
  });
  const g = {high:[], med:[], low:[]};
  sorted.forEach(m => g[m.priority].push(m));
  const labels = {high:'Must Screen', med:'Next Up', low:'On the Docket'};

  let html = `<button class="add-btn" id="add-btn">+ Add to the Roster</button>`;
  if (!sorted.length) return html + `<div class="empty-msg">The screening room awaits its first selection.</div>`;

  ['high','med','low'].forEach(p => {
    if (!g[p].length) return;
    html += `<div class="section-label">${labels[p]}</div>`;
    g[p].forEach(m => {
      const vc = Object.keys(m.votes||{}).length;
      html += `<div class="card">
        <div class="card-top">
          ${m.poster ? `<img class="poster" src="${m.poster}" alt="${esc(m.title)}" loading="lazy"/>` : `<div class="poster-ph">🎬</div>`}
          <div class="card-meta">
            <div style="display:flex;justify-content:space-between;gap:4px">
              <div class="movie-title">${esc(m.title)}</div>
              <span class="ptag p-${p}">${p==='high'?'Priority':p==='med'?'Queued':'TBD'}</span>
            </div>
            ${m.year  ? `<div class="movie-year">${m.year}</div>` : ''}
            ${m.genre ? `<div class="movie-genre">${m.genre}</div>` : ''}
            ${m.notes ? `<div class="movie-notes">${esc(m.notes)}</div>` : ''}
            <div class="picker-pill">${m.picker}'s pick</div>
            ${vc ? `<div class="vote-count">${vc} vote${vc>1?'s':''}</div>` : ''}
            ${m.tmdb ? `<div class="omdb-scores"><span class="badge tmdb">TMDB ${m.tmdb}</span></div>` : ''}
          </div>
        </div>
        <div class="votes-row">
          ${MEMBERS.map(n => `<span class="vchip${m.votes&&m.votes[n]?' voted':''}" data-id="${m.id}" data-member="${n}">${n}</span>`).join('')}
          ${MEMBERS_TBD.map(n => `<span class="vchip${m.votes&&m.votes[n]?' voted':''}" data-id="${m.id}" data-member="${n}" style="opacity:0.4;font-style:italic">${n}*</span>`).join('')}
        </div>
        <div class="card-actions">
          <button class="btn-g" data-action="watched" data-id="${m.id}">✓ Watched</button>
          <button class="btn-r" data-action="remove-watch" data-id="${m.id}">Remove</button>
        </div>
      </div>`;
    });
  });
  return html;
}

/* ── WATCHED ── */
function buildWatched() {
  if (!state.watched.length) return `<div class="empty-msg">No screenings on record yet.</div>`;
  return [...state.watched].reverse().map(m => {
    const r = m.ratings || {};
    const vals = MEMBERS.map(n => r[n]).filter(v => v > 0);
    const avg = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
    return `<div class="card">
      <div class="card-top">
        ${m.poster ? `<img class="poster" src="${m.poster}" alt="${esc(m.title)}" loading="lazy"/>` : `<div class="poster-ph">🎬</div>`}
        <div class="card-meta">
          <div class="movie-title">${esc(m.title)}</div>
          ${m.year  ? `<div class="movie-year">${m.year}</div>` : ''}
          ${m.genre ? `<div class="movie-genre">${m.genre}</div>` : ''}
          <div class="picker-pill">${m.picker}'s pick</div>
          <div class="avg-line${avg?'':' empty'}" id="avg-${m.id}">${avg ? 'Club Avg: '+avg+' / 10' : 'No scores yet'}</div>
          ${m.tmdb ? `<div class="omdb-scores"><span class="badge tmdb">TMDB ${m.tmdb}</span></div>` : ''}
        </div>
      </div>
      <div class="scores-grid">
        ${MEMBERS.map(n => `<div class="score-cell">
          <div class="score-name">${n}</div>
          <input class="score-input" type="number" min="1" max="10" inputmode="numeric" placeholder="—"
            value="${r[n]||''}" data-id="${m.id}" data-member="${n}"/>
        </div>`).join('')}
      </div>
      <div class="tbd-label">Under Panel Review</div>
      <div class="scores-grid">
        ${MEMBERS_TBD.map(n => `<div class="score-cell tbd">
          <div class="score-name tbd">${n}</div>
          <input class="score-input tbd" type="number" min="1" max="10" inputmode="numeric" placeholder="—"
            value="${r[n]||''}" data-id="${m.id}" data-member="${n}"/>
        </div>`).join('')}
      </div>
      <div class="card-actions">
        <button class="btn-r" data-action="remove-watched" data-id="${m.id}">Remove</button>
      </div>
    </div>`;
  }).join('');
}

/* ── FORM ── */
function buildForm() {
  const fd = state.fd;
  return `<div class="form-box">
    <div class="form-title">Add to the Roster</div>
    <div class="fetch-row">
      <div class="field"><label>Title</label>
        <input id="f-title" placeholder="Film title" value="${esc(fd.title||'')}"/>
      </div>
      <button class="fetch-btn" id="fetch-btn">Fetch ↗</button>
    </div>
    ${fd.status ? `<div class="fetch-status">${fd.status}</div>` : ''}
    ${fd.poster ? `<div class="fetch-preview">
      <img src="${fd.poster}" alt="poster"/>
      <div>
        <div class="fetch-preview-title">${esc(fd.title||'')}</div>
        <div class="fetch-preview-sub">${fd.year||''}${fd.genre?' · '+fd.genre:''}</div>
        ${fd.tmdb ? `<div class="fetch-preview-sub">TMDB ${fd.tmdb}</div>` : ''}
      </div>
    </div>` : ''}
    <div class="field"><label>Year</label>
      <input id="f-year" type="number" inputmode="numeric" placeholder="1984" value="${esc(fd.year||'')}"/>
    </div>
    <div class="field"><label>Selected by</label>
      <select id="f-picker">${MEMBERS.map(n=>`<option${n===(fd.picker||'Chris')?' selected':''}>${n}</option>`).join('')}</select>
    </div>
    <div class="field"><label>Priority</label>
      <select id="f-priority">
        <option value="high"${(fd.priority||'high')==='high'?' selected':''}>Must Screen</option>
        <option value="med"${fd.priority==='med'?' selected':''}>Next Up</option>
        <option value="low"${fd.priority==='low'?' selected':''}>On the Docket</option>
      </select>
    </div>
    <div class="field"><label>Notes</label>
      <textarea id="f-notes" placeholder="Brief synopsis or notes">${esc(fd.notes||'')}</textarea>
    </div>
    <div class="form-actions">
      <button class="fbtn primary" id="submit-btn">Add Film</button>
      <button class="fbtn cancel" id="cancel-btn">Cancel</button>
    </div>
  </div>`;
}

/* ── HELPERS ── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openForm() {
  state.fd = {title:'', year:'', picker:'Chris', priority:'high', notes:'', poster:null, genre:'', tmdb:null, status:''};
  state.showForm = true;
  render();
  setTimeout(() => document.getElementById('f-title')?.focus(), 50);
}

function closeForm() {
  state.showForm = false;
  render();
}

function submitAdd() {
  const title = (document.getElementById('f-title')?.value || '').trim();
  if (!title) return;
  const fd = state.fd;
  state.watchlist.push({
    id:       state.nextId++,
    title,
    year:     document.getElementById('f-year')?.value     || fd.year     || '',
    picker:   document.getElementById('f-picker')?.value   || fd.picker   || 'Chris',
    priority: document.getElementById('f-priority')?.value || fd.priority || 'high',
    notes:    document.getElementById('f-notes')?.value    || fd.notes    || '',
    poster:   fd.poster  || null,
    genre:    fd.genre   || '',
    tmdb:     fd.tmdb    || null,
    votes:    {}
  });
  state.showForm = false;
  state.tab = 'watchlist';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'watchlist'));
  render();
}

function saveScore(id, member, val) {
  const m = state.watched.find(x => x.id === id);
  if (!m) return;
  m.ratings = m.ratings || {};
  const v = parseInt(val);
  if (v >= 1 && v <= 10) m.ratings[member] = v;
  else delete m.ratings[member];
  const vals = MEMBERS.map(n => m.ratings[n]).filter(v => v > 0);
  const el = document.getElementById('avg-' + id);
  if (el) {
    if (vals.length) {
      el.textContent = 'Club Avg: ' + (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) + ' / 10';
      el.className = 'avg-line';
    } else {
      el.textContent = 'No scores yet';
      el.className = 'avg-line empty';
    }
  }
}

function toggleVote(id, member) {
  const m = state.watchlist.find(x => x.id === id);
  if (!m) return;
  m.votes = m.votes || {};
  if (m.votes[member]) delete m.votes[member];
  else m.votes[member] = true;
  render();
}

function moveToWatched(id) {
  const idx = state.watchlist.findIndex(x => x.id === id);
  if (idx < 0) return;
  const m = state.watchlist.splice(idx, 1)[0];
  m.ratings = {};
  state.watched.push(m);
  state.tab = 'watched';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'watched'));
  render();
}

function del(id, list) {
  if (list === 'watchlist') state.watchlist = state.watchlist.filter(x => x.id !== id);
  else state.watched = state.watched.filter(x => x.id !== id);
  render();
}

render();
autoFetch();
</script>
</body>
</html>
