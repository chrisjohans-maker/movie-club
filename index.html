<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chris's Movie Club</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Movie Club">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0A0500">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0A0500;font-family:'Special Elite',serif;color:#F9F0DC;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px}
.header{text-align:center;padding:1.1rem 1rem .9rem;border-bottom:1px solid #2a1f00}
.header-rule{height:1px;background:linear-gradient(to right,transparent,#5a3a00,#F5C842,#5a3a00,transparent);margin:0 0 .6rem}
.header-rule.bottom{margin:.5rem 0 0}
.bulb-row{display:flex;justify-content:center;gap:16px;margin-bottom:7px}
.bulb-row.bottom{margin-top:7px;margin-bottom:0}
.bulb{width:8px;height:8px;border-radius:50%;background:#FFF8C0;flex-shrink:0}
.bulb.on{box-shadow:0 0 4px 1px #FFF8C0,0 0 10px 3px #FFD700;opacity:1}
.bulb.dim{opacity:.12}
.club-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:6px;color:#F5C842;text-shadow:0 0 16px rgba(245,200,66,.3)}
.club-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;color:#b89a40;margin-top:2px}
.members-line{font-size:10px;color:#7a6030;letter-spacing:2px;margin-top:4px}
.snack-bar{display:flex;justify-content:center;gap:18px;padding:.55rem 0;border-top:1px solid #1a1200;margin-top:.6rem}
.snack-icon{font-size:16px;line-height:1}
@keyframes nuggetBounce{0%,100%{transform:translateY(0)}45%{transform:translateY(-4px)}70%{transform:translateY(-2px)}}
@keyframes pizzaSpin{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes beerSlosh{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes whiskeySwirl{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes popcornPop{0%,85%,100%{transform:translateY(0) scale(1)}92%{transform:translateY(-5px) scale(1.15)}}
.snack-nugget{animation:nuggetBounce 1.2s ease-in-out infinite}
.snack-pizza{animation:pizzaSpin 2.2s ease-in-out infinite}
.snack-beer{animation:beerSlosh 1.5s ease-in-out infinite}
.snack-whiskey{animation:whiskeySwirl 2.5s ease-in-out infinite}
.snack-popcorn{animation:popcornPop 1.9s ease-in-out infinite}
.header-top{display:flex;align-items:center;justify-content:flex-end;padding:.4rem .9rem 0}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;border:1.5px solid;flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4a8a10;display:inline-block;margin-left:6px;vertical-align:middle}
.sync-dot.off{background:#6a2020}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#080400;border-top:1px solid #2a1f00;display:flex;z-index:100}
.nav-btn{flex:1;padding:12px 2px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:#5a4020;cursor:pointer;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-btn.active{color:#F5C842}
.nav-icon{font-size:20px;line-height:1}
.content{padding:.9rem}
.section-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:#7a6030;margin:.6rem 0 .35rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:#2a1f00}
.card{background:#100800;border:1px solid #2a1f00;padding:.85rem .9rem;margin-bottom:8px}
.add-btn{width:100%;padding:11px;background:transparent;border:1px solid #3a2f00;color:#b89a40;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;cursor:pointer;margin-bottom:1rem;display:block}
.card-top{display:flex;gap:10px;margin-bottom:6px}
.poster{width:52px;height:76px;object-fit:cover;object-position:center top;flex-shrink:0;border:1px solid #2a1f00;background:#080400}
.poster-ph{width:52px;height:76px;flex-shrink:0;border:1px solid #2a1f00;background:#080400;display:flex;align-items:center;justify-content:center;font-size:22px;color:#2a1f00}
.card-meta{flex:1;min-width:0}
.movie-title{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;color:#F9F0DC;line-height:1.3}
.movie-year{font-size:11px;color:#7a6030;margin-top:2px}
.movie-genre{font-size:10px;color:#5a4820;margin-top:2px;font-style:italic}
.film-director{font-size:10px;color:#5a4820;margin-top:2px;font-family:'Special Elite',serif}
.film-tagline{font-size:10px;color:#7a6030;font-style:italic;margin-top:3px;line-height:1.4;font-family:'Special Elite',serif}
.movie-notes{font-size:11px;color:#7a6030;margin-top:3px;line-height:1.4}
.badge{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:2px 7px;border:1px solid #1a3a4a;color:#4ab0cc}
.picker-pill{display:inline-block;font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;padding:2px 7px;border:1px solid #3a2f00;color:#b89a40;margin-top:4px}
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:9px;border-top:1px solid #1a1200;align-items:center}
.btn-g{font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 12px;cursor:pointer;background:#1a3a00;color:#7de020;border:1px solid #4a8a10}
.btn-r{font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 12px;cursor:pointer;background:#2a0a0a;color:#cc5050;border:1px solid #6a2020}
.btn-gold{font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 12px;cursor:pointer;background:#3a2000;color:#F5C842;border:1px solid #7a5a00}
.btn-subtle{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:8px 10px;cursor:pointer;background:transparent;color:#5a4020;border:1px solid #2a1f00}
.scores-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:9px}
.score-cell{background:#0a0600;border:1px solid #2a1f00;padding:7px 6px;text-align:center}
.score-cell.mine{border-width:1.5px}
.score-name{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#7a6030;margin-bottom:2px}
.score-alias{font-size:8px;color:#5a4020;font-style:italic;margin-bottom:3px}
.score-input{width:100%;background:#050300;border:1px solid #3a2f00;color:#F5C842;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;text-align:center;padding:4px 2px;outline:none}
.score-input.readonly{color:#555;pointer-events:none;border-color:#1a1200;background:#030200}
.score-input::placeholder{color:#2a1f00;font-size:14px}
.score-tier-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.score-tier{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:12px 6px;border:1px solid #2a1f00;background:#080400;cursor:pointer;user-select:none;text-align:center}
.score-tier:active{opacity:.7}
.score-tier-stars{font-size:14px;line-height:1;color:#2a1f00}
.score-tier-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:#3a2f00}
.score-tier-range{font-size:9px;font-family:'Special Elite',serif;color:#2a1800}
.score-tier.selected-s4{border-color:#E8A020;background:#1e1000}
.score-tier.selected-s4 .score-tier-stars,.score-tier.selected-s4 .score-tier-label{color:#F5C842}
.score-tier.selected-s4 .score-tier-range{color:#7a5a00}
.score-tier.selected-s3{border-color:#6a9a20;background:#0c1800}
.score-tier.selected-s3 .score-tier-stars,.score-tier.selected-s3 .score-tier-label{color:#90c830}
.score-tier.selected-s3 .score-tier-range{color:#3a6000}
.score-tier.selected-s2{border-color:#1a4060;background:#001420}
.score-tier.selected-s2 .score-tier-stars,.score-tier.selected-s2 .score-tier-label{color:#4090c0}
.score-tier.selected-s2 .score-tier-range{color:#1a4060}
.score-tier.selected-s1{border-color:#5a2020;background:#180606}
.score-tier.selected-s1 .score-tier-stars,.score-tier.selected-s1 .score-tier-label{color:#c06060}
.score-tier.selected-s1 .score-tier-range{color:#5a2020}
.score-member-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:10px}
.score-member-cell{background:#0a0600;border:1px solid #2a1f00;padding:8px 6px;text-align:center}
.score-member-cell.mine{border-width:1.5px}
.score-member-name{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#7a6030;margin-bottom:2px}
.score-member-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#3a2f00}
.tbd-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#4a3820;margin-top:9px;margin-bottom:4px;border-top:1px solid #1a1200;padding-top:7px}
.avg-line{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:#F5C842;margin-top:7px}
.avg-line.empty{color:#3a2f00}
.empty-msg{text-align:center;padding:2.5rem 1rem;color:#3a2f00;font-family:'Playfair Display',serif;font-style:italic;font-size:13px}
.loading{text-align:center;padding:3rem 1rem;color:#5a4020;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px}
.form-box{background:#100800;border:1px solid #4a3500;padding:1.1rem;margin-top:.75rem}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:4px;color:#F5C842;margin-bottom:.9rem}
.field{margin-bottom:9px}
.field label{display:block;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:#7a6030;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;background:#0a0600;border:1px solid #2a1f00;color:#F9F0DC;font-family:'Special Elite',serif;font-size:14px;padding:8px 9px;outline:none;-webkit-appearance:none;border-radius:0}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#E8A020}
.field select option{background:#0a0600}
.field textarea{height:52px;resize:none}
.fetch-row{display:flex;gap:6px;align-items:flex-end;margin-bottom:9px}
.fetch-row .field{flex:1;margin-bottom:0}
.fetch-btn{padding:8px 10px;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;background:#1a1800;color:#b89a40;border:1px solid #3a3000;white-space:nowrap;flex-shrink:0}
.fetch-status{font-size:11px;color:#7a6030;font-style:italic;margin-bottom:6px}
.fetch-preview{display:flex;gap:10px;align-items:center;background:#0a0600;border:1px solid #2a1f00;padding:8px;margin-bottom:9px}
.fetch-preview img{width:36px;height:52px;object-fit:cover;border:1px solid #2a1f00;flex-shrink:0}
.fetch-preview-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#F9F0DC}
.fetch-preview-sub{font-size:10px;color:#7a6030;margin-top:2px}
.form-actions{display:flex;gap:8px;margin-top:1rem}
.fbtn{padding:10px 16px;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;cursor:pointer;border-radius:0}
.fbtn.primary{background:#3a2800;color:#F5C842;border:1px solid #7a5a00}
.fbtn.cancel{background:#1a1200;color:#7a6030;border:1px solid #2a1f00}
.identity-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center}
.identity-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;color:#F5C842;margin-bottom:.5rem}
.identity-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#7a6030;margin-bottom:2.5rem}
.member-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px}
.member-card{border:2px solid transparent;padding:1.1rem .9rem;cursor:pointer;text-align:center}
.member-card-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:4px}
.member-card-alias{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;color:#7a6030}
.tbd-section{margin-top:1.5rem;font-size:10px;color:#4a3820;font-family:'Bebas Neue',sans-serif;letter-spacing:2px}
.tbd-cards{display:flex;gap:8px;margin-top:.6rem;justify-content:center}
.tbd-card{background:#0a0600;border:1px solid #2a1f00;padding:.7rem 1.2rem;cursor:pointer;text-align:center;opacity:.6}
.tbd-card-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#7a6030}
.tbd-card-alias{font-size:10px;color:#4a3820;font-style:italic;margin-top:2px}
.personal-panel{border:1px solid transparent;padding:.6rem .75rem;margin-bottom:.6rem}
.personal-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;margin-bottom:1px}
.personal-alias{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;margin-bottom:.4rem}
.personal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:.4rem}
.pstat{background:rgba(0,0,0,.3);padding:.55rem .4rem;text-align:center}
.pstat-val{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#F9F0DC}
.pstat-label{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#5a4020;margin-top:2px}
.critic-badge{display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;padding:2px 8px;margin-bottom:.3rem}
.info-banner{font-size:11px;font-family:'Special Elite',serif;font-style:italic;padding:.5rem .7rem;background:rgba(0,0,0,.3);border-left:2px solid;margin-top:.5rem;line-height:1.5}
.unscored-card{display:flex;align-items:center;gap:8px;background:#100800;border:1px solid #2a1f00;padding:.5rem .7rem;margin-bottom:5px;cursor:pointer}
.unscored-poster{width:36px;height:52px;object-fit:cover;flex-shrink:0;border:1px solid #2a1f00}
.unscored-ph{width:36px;height:52px;flex-shrink:0;border:1px solid #2a1f00;background:#080400;display:flex;align-items:center;justify-content:center;font-size:16px;color:#2a1f00}
.unscored-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#F9F0DC;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unscored-prompt{font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:4px 8px;border:1px solid;flex-shrink:0}
.pulse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.6rem}
.pulse-card{background:#100800;border:1px solid #2a1f00;position:relative}
.pulse-poster{width:100%;height:140px;object-fit:cover;display:block;border-bottom:1px solid #2a1f00}
.pulse-poster-ph{width:100%;height:140px;background:#080400;display:flex;align-items:center;justify-content:center;font-size:24px;color:#2a1f00;border-bottom:1px solid #2a1f00}
.pulse-info{padding:4px 5px;overflow:hidden}
.pulse-rank{position:absolute;top:5px;left:5px;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:2px 6px;background:rgba(0,0,0,.75)}
.pulse-title{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;color:#F9F0DC;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pulse-score{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;margin-top:2px}
.pulse-pips{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap}
.no-screening{padding:3rem 1rem;text-align:center}
.no-screening-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;color:#5a4020;margin-bottom:.5rem}
.no-screening-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#3a2f00;margin-bottom:1.5rem}
.whats-next-card{background:#100800;border:1px solid #2a1f00;padding:.9rem;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.whats-next-poster{width:60px;height:88px;object-fit:cover;flex-shrink:0;border:1px solid #2a1f00}
.whats-next-poster-ph{width:60px;height:88px;flex-shrink:0;border:1px solid #2a1f00;background:#080400;display:flex;align-items:center;justify-content:center;font-size:22px;color:#2a1f00}
.whats-next-meta{flex:1;min-width:0}
.whats-next-rank{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;margin-bottom:3px}
.whats-next-title{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;color:#F9F0DC;line-height:1.3;margin-bottom:3px}
.whats-next-info{font-size:10px;color:#5a4020;font-family:'Special Elite',serif;margin-bottom:5px}
.whats-next-score{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;margin-bottom:6px}
.whats-next-pips{display:flex;gap:3px;margin-bottom:8px}
.date-requests{margin-top:1.25rem}
.date-req-title{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:#7a6030;margin-bottom:.6rem;display:flex;align-items:center;gap:8px}
.date-req-title::after{content:'';flex:1;height:1px;background:#2a1f00}
.date-req-row{display:flex;align-items:center;gap:8px;padding:.55rem 0;border-bottom:1px solid #1a1200}
.date-req-name{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;min-width:60px;flex-shrink:0}
.date-req-val{font-size:11px;color:#b89a40;font-family:'Special Elite',serif;flex:1}
.date-req-empty{font-size:11px;color:#3a2f00;font-style:italic}
.my-request-form{background:#0a0600;border:1px solid #2a1f00;padding:.85rem;margin-top:.75rem}
.my-request-title{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;color:#5a4020;margin-bottom:.6rem}
.req-row{display:flex;gap:6px;align-items:flex-end}
.req-row .field{flex:1;margin-bottom:0}
.screening-wrap{text-align:center;padding:.1rem 0}
.screening-poster{width:90px;margin:0 auto .4rem;display:block;border:1px solid #2a1f00}
.screening-poster-ph{width:90px;height:132px;margin:0 auto .4rem;border:1px solid #2a1f00;background:#100800;display:flex;align-items:center;justify-content:center;font-size:30px;color:#2a1f00}
.screening-title{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:#F9F0DC;margin-bottom:1px}
.screening-subtitle{font-size:10px;color:#7a6030;font-style:italic;margin-bottom:.2rem}
.screening-event-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:4px;color:#7a6030;margin-bottom:1px}
.screening-date{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:#b89a40;margin-bottom:1px}
.screening-times{font-size:10px;color:#5a4020;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:.35rem}
.countdown{display:flex;justify-content:center;gap:5px;margin-bottom:.4rem}
.cd-block{background:#100800;border:1px solid #2a1f00;padding:4px 7px;min-width:40px;text-align:center}
.cd-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#F5C842;line-height:1}
.cd-label{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#5a4020;margin-top:3px}
.rsvp-section{margin-bottom:.5rem}
.rsvp-title{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#7a6030;margin-bottom:.3rem}
.rsvp-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.rsvp-chip{font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:4px 7px;border:1px solid #2a1f00;cursor:pointer;background:transparent;color:#5a4020}
.rsvp-chip.yes{background:#1a3a00;color:#7de020;border-color:#4a8a10}
.rsvp-chip.no{background:#2a0a0a;color:#cc5050;border-color:#6a2020}
.live-scoring{background:#100800;border:1px solid #4a3500;padding:1rem;margin-bottom:1rem}
.live-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:#F5C842;margin-bottom:.2rem;animation:pulse 2s ease-in-out infinite}

/* ── FIRESTORE ── */
async function initFirestore() {
  const wSnap=await getDocs(collection(db,'watchlist'));
  if(wSnap.empty){
    const batch=writeBatch(db);
    SEED_WATCHLIST.forEach(m=>batch.set(doc(db,'watchlist',m.id),m));
    SEED_WATCHED.forEach(m=>batch.set(doc(db,'watched',m.id),m));
    await batch.commit();
  }
  onSnapshot(collection(db,'watchlist'),snap=>{
    state.watchlist=snap.docs.map(d=>({...d.data(),id:d.id}));
    state.watchlist.forEach((m,i)=>{if(m.sortOrder==null)m.sortOrder=i*10;});
    if(state.loaded)render();
    fetchMissingData(state.watchlist,'watchlist');
  });
  onSnapshot(collection(db,'watched'),snap=>{
    state.watched=snap.docs.map(d=>({...d.data(),id:d.id}));
    state.loaded=true;
    document.getElementById('sync-dot').classList.remove('off');
    render();
    fetchMissingData(state.watched,'watched');
  });
  onSnapshot(doc(db,'config','screening'),snap=>{
    state.screening=snap.exists()?snap.data():null;
    if(state.loaded){checkScreeningExpiry();render();}
  });
  onSnapshot(doc(db,'config','membership'),snap=>{
    state.membership=snap.exists()?snap.data():{votes:{}};
    if(state.loaded)render();
  });
  onSnapshot(doc(db,'config','dateRequests'),snap=>{
    state.dateRequests=snap.exists()?snap.data():{requests:{}};
    if(state.loaded)render();
  });
  onSnapshot(doc(db,'config','screeningSeen'),snap=>{
    state.screeningSeen=snap.exists()?snap.data():{};
    if(state.loaded)render();
  });
}

async function fetchMissingData(movies,coll) {
  for(const m of movies){
    if(m.poster&&m.director&&m.cast)continue;
    try{
      const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(m.title)}&language=en-US&page=1`);
      const d=await r.json();const hit=d.results&&d.results[0];
      if(!hit)continue;
      const updates={};
      if(!m.poster&&hit.poster_path)updates.poster=TMDB_IMG+hit.poster_path;
      if(!m.year&&hit.release_date)updates.year=hit.release_date.slice(0,4);
      if(!m.tmdb&&hit.vote_average)updates.tmdb=hit.vote_average.toFixed(1);
      try{
        const dr=await fetch(`https://api.themoviedb.org/3/movie/${hit.id}?api_key=${TMDB_KEY}&language=en-US&append_to_response=credits`);
        const dd=await dr.json();
        if(!m.genre&&dd.genres&&dd.genres.length)updates.genre=dd.genres[0].name;
        if(!m.director||m.director===''){const dir=dd.credits&&dd.credits.crew&&dd.credits.crew.find(c=>c.job==='Director');if(dir)updates.director=dir.name;}
        if(!m.runtime&&dd.runtime)updates.runtime=dd.runtime;
        if(!m.tagline||m.tagline==='')updates.tagline=dd.tagline||'';
        if(!m.overview&&dd.overview)updates.overview=dd.overview;
        if(!m.cast&&dd.credits&&dd.credits.cast)updates.cast=dd.credits.cast.slice(0,4).map(a=>a.name).join(', ');
      }catch(e){}
      if(Object.keys(updates).length)await updateDoc(doc(db,coll,m.id),updates);
    }catch(e){}
  }
}

/* ── HELPERS ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getCriticBadge(avg,count){if(count<2)return 'Unproven';if(avg>=8.5)return 'The Optimist';if(avg<=5.5)return 'The Hardliner';if(avg>=7.5)return 'The Enthusiast';if(avg>=6.5)return 'The Measured';return 'The Realist';}
function isLive(){if(!state.screening||!state.screening.showtime)return false;return Date.now()>=new Date(state.screening.showtime).getTime();}
function isExpired(){if(!state.screening||!state.screening.showtime)return false;return Date.now()>=new Date(state.screening.showtime).getTime()+(4*60*60*1000);}
function formatDate(iso){if(!iso)return '';return new Date(iso).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}
function formatTime(iso){if(!iso)return '';return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function getInterestScore(m){const iv=m.interestVotes||{};const vals=ALL_MEMBERS.map(n=>iv[n]).filter(v=>v>0);if(!vals.length)return 0;return vals.reduce((a,b)=>a+b,0)/vals.length;}
function getInterestLabel(score){if(score>=3.5)return 'Must Screen';if(score>=2.5)return 'Want to See';if(score>=1.5)return 'Maybe';if(score>0)return 'Low Interest';return 'Unvoted';}

function render() {
  const c=document.getElementById('content');
  if(!state.loaded){c.innerHTML=`<div class="loading">Connecting...</div>`;return;}
  if(state.showForm==='add-movie'){c.innerHTML=buildAddMovieForm();bindForm();return;}
  if(state.showForm==='research'){c.innerHTML=buildResearch();bindResearch();return;}
  if(state.showForm==='schedule'){c.innerHTML=buildScheduleForm();bindScheduleForm();return;}
  if(state.showForm==='edit'){c.innerHTML=buildEditForm();bindEditForm();return;}
  if(state.showForm==='summary'){
    // Render summary as fixed overlay
    let overlay=document.getElementById('summary-overlay');
    if(!overlay){overlay=document.createElement('div');overlay.id='summary-overlay';overlay.style.cssText='position:fixed;inset:0;background:#0A0500;z-index:120;max-width:480px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden';document.body.appendChild(overlay);}
    overlay.style.display='flex';
    overlay.innerHTML=buildSummary();
    bindSummary();
    return;
  } else {
    const overlay=document.getElementById('summary-overlay');
    if(overlay)overlay.style.display='none';
  }
  if(state.tab==='home')c.innerHTML=buildHome();
  else if(state.tab==='screening')c.innerHTML=buildScreening();
  else if(state.tab==='watchlist')c.innerHTML=buildWatchlist();
  else c.innerHTML=buildWatched();
  bindEvents();
  if(state.tab==='screening'&&state.screening&&!isExpired())startCountdown();
  // Notification dot — show if screening exists and current user hasn't seen it
  updateScreeningDot();
}

function buildInterestGrid(movieId,myVote) {
  const levels=[
    {val:4,icon:'★',name:'Must See',sub:'Top priority',bc:'#7a5a00',bg:'#1e1000',tc:'#F5C842'},
    {val:3,icon:'★',name:'Want to See',sub:'Keen',bc:'#3a6000',bg:'#0c1800',tc:'#90c830'},
    {val:2,icon:'◆',name:'Maybe',sub:'On the fence',bc:'#1a4060',bg:'#001420',tc:'#4090c0'},
    {val:1,icon:'✕',name:'Pass',sub:'Not for me',bc:'#5a2020',bg:'#180606',tc:'#c06060'},
  ];
  return levels.map(l=>{
    const sel=myVote===l.val;
    return `<div data-interest-id="${movieId}" data-interest-val="${l.val}"
      style="border:1px solid ${sel?l.bc:'#2a1f00'};background:${sel?l.bg:'#080400'};cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 6px;text-align:center;user-select:none">

      <div style="font-size:9px;font-family:'Special Elite',serif;font-style:italic;color:${sel?l.bc:'#1a1200'}">${l.sub}</div>

}

  const u=state.currentUser;const p=PROFILES[u];
  const w=state.watched;
  const myScores=w.map(m=>m.ratings&&m.ratings[u]).filter(v=>v>0);
  const myAvg=myScores.length?(myScores.reduce((a,b)=>a+b,0)/myScores.length).toFixed(1):'—';
  const myHigh=myScores.length?Math.max(...myScores):null;
  const myLow=myScores.length?Math.min(...myScores):null;

  const unscored=w.filter(m=>!m.ratings||!m.ratings[u]);
  const sc=state.screening;
  let html='';
  if(sc){const live=isLive();html+=`<div class="marquee-banner"><div class="marquee-inner">${live?'● NOW SCREENING':'◆ NEXT SCREENING'} &nbsp;·&nbsp; ${esc(sc.title)} &nbsp;·&nbsp; ${formatDate(sc.showtime)} &nbsp;·&nbsp; Doors ${formatTime(sc.doorsTime)} &nbsp;·&nbsp; Showtime ${formatTime(sc.showtime)} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div></div>`;}
  html+=`<div class="personal-panel" style="border-color:${p.border};background:${p.bg}">
    <div class="personal-name" style="color:${p.color}">${u}</div>
    <div class="personal-alias" style="color:${p.color}">${p.alias}</div>
    <div class="personal-stats">
      <div class="pstat"><div class="pstat-val">${myAvg}</div><div class="pstat-label">Your avg</div></div>
      <div class="pstat"><div class="pstat-val">${myHigh||'—'}</div><div class="pstat-label">Highest</div></div>
      <div class="pstat"><div class="pstat-val">${myLow||'—'}</div><div class="pstat-label">Lowest</div></div>
    </div>

  </div>`;
  // Club Pulse
  const ranked=[...state.watchlist].filter(m=>!state.screening||m.id!==state.screening.movieId).map(m=>({...m,score:getInterestScore(m)})).sort((a,b)=>b.score-a.score).slice(0,3);
  html+=`<div class="section-label">Club Pulse</div>`;
  if(ranked.length&&ranked[0].score>0){
    const rankColors=['#F5C842','#aaaaaa','#8B5E3C'];const rankLabels=['1st','2nd','3rd'];
    html+=`<div class="pulse-grid">`;
    ranked.forEach((m,i)=>{
      const iv=m.interestVotes||{};const myV=iv[u]||0;
      const scoreColor=m.score>=3.5?'#F5C842':m.score>=2.5?'#90c830':'#4090c0';
      const pips=ALL_MEMBERS.map(n=>{const v=iv[n];const c=v===4?'#E8A020':v===3?'#6a9a20':v===2?'#2a6a8a':v===1?'#6a2a2a':'#1a1200';return `<span style="width:6px;height:6px;border-radius:50%;background:${c};display:inline-block;flex-shrink:0"></span>`;}).join('');
      html+=`<div class="pulse-card">
        ${m.poster?`<img class="pulse-poster" src="${m.poster}" alt="${esc(m.title)}" loading="lazy"/>`:`<div class="pulse-poster-ph">🎬</div>`}
        <div class="pulse-rank" style="color:${rankColors[i]}">${rankLabels[i]}</div>
        <div class="pulse-info">
          <div class="pulse-title">${esc(m.title)}</div>
          ${m.year||m.genre?`<div style="font-size:9px;color:#5a4020;font-family:'Special Elite',serif;margin-top:2px">${[m.year,m.genre].filter(Boolean).join(' · ')}</div>`:''}
          ${m.director?`<div style="font-size:9px;color:#4a3820;font-family:'Special Elite',serif;margin-top:1px">Dir. ${esc(m.director)}</div>`:''}
          ${m.tagline?`<div style="font-size:9px;color:#5a4820;font-style:italic;font-family:'Special Elite',serif;margin-top:2px;line-height:1.3">${esc(m.tagline)}</div>`:''}
          <div class="pulse-score" style="color:${scoreColor};margin-top:4px">${m.score.toFixed(1)}</div>
          <div class="pulse-pips">${pips}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }else{html+=`<div style="text-align:center;padding:1.5rem;color:#3a2f00;font-family:'Playfair Display',serif;font-style:italic;font-size:12px;border:1px solid #1a1200">Cast your interest votes on the To Watch tab to see the Club Pulse.</div>`;}
  if(unscored.length){
    html+=`<div class="section-label">Score These</div>`;
    unscored.slice(0,3).forEach(m=>{html+=`<div class="unscored-card" data-action="go-watched" data-id="${m.id}">${m.poster?`<img class="unscored-poster" src="${m.poster}" alt="${esc(m.title)}" loading="lazy"/>`:`<div class="unscored-ph">🎬</div>`}<div class="unscored-title">${esc(m.title)}</div><span class="unscored-prompt" style="border-color:${p.border};color:${p.color}">Score</span></div>`;});
  }
  // Gap 3 — unvoted films nudge
  const unvoted=state.watchlist.filter(m=>!(m.interestVotes&&m.interestVotes[u]));
  if(unvoted.length){
    html+=`<div class="section-label">Cast Your Vote</div>`;
    unvoted.slice(0,3).forEach(m=>{html+=`<div class="unscored-card" data-action="go-watchlist" data-id="${m.id}">${m.poster?`<img class="unscored-poster" src="${m.poster}" alt="${esc(m.title)}" loading="lazy"/>`:`<div class="unscored-ph">🎬</div>`}<div class="unscored-title">${esc(m.title)}</div><span class="unscored-prompt" style="border-color:${p.border};color:${p.color}">Vote</span></div>`;});
    if(unvoted.length>3)html+=`<div style="font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#3a2f00;text-align:center;padding:.4rem">${unvoted.length-3} more films need your vote</div>`;
  }
  return html;
}

/* ── SCREENING ── */
function buildScreening() {
  const sc=state.screening;const u=state.currentUser;const canSchedule=u==='Chris';
  if(!sc||isExpired())return buildWhatsNext(canSchedule,u);
  const live=isLive();const rsvp=sc.rsvp||{};
  let html=`<div class="screening-wrap">`;
  if(live){
    html+=`<div class="live-scoring"><div class="live-title">● NOW SCREENING</div><div class="live-sub">Scoring is open — enter your rating below</div>`;
    const we=state.watched.find(m=>m.id===sc.watchedId);
    if(we){
      const r=we.ratings||{};const vals=MEMBERS.map(n=>r[n]).filter(v=>v>0);const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
      html+=`<div class="avg-line${avg?'':' empty'}" id="avg-${we.id}" style="text-align:center;margin-bottom:.75rem">${avg?'Club Avg: '+avg+' / 10':'Scores coming in...'}</div>`;
      html+=buildScoreTierGrid(we.id,u,r[u]);
      html+=buildScoreMemberGrid(we,u,r);
      html+=`<div style="margin-top:.75rem;text-align:center"><button class="btn-gold" id="show-summary-btn" data-watched-id="${we.id}">View Full Summary</button></div>`;
    }
    html+=`</div>`;
  }
  html+=sc.poster?`<img class="screening-poster" src="${sc.poster}" alt="${esc(sc.title)}" loading="lazy"/>`:`<div class="screening-poster-ph">🎬</div>`;
  html+=`<div class="screening-title">${esc(sc.title)}</div>`;
  if(sc.year||sc.genre)html+=`<div class="screening-subtitle">${sc.year||''}${sc.year&&sc.genre?' · ':''}${sc.genre||''}</div>`;
  html+=`<div class="screening-event-label">Next Screening</div><div class="screening-date">${formatDate(sc.showtime)}</div><div class="screening-times">Doors ${formatTime(sc.doorsTime)} &nbsp;·&nbsp; Showtime ${formatTime(sc.showtime)}</div>`;
  if(!live){html+=`<div class="countdown" id="countdown"><div class="cd-block"><div class="cd-val" id="cd-d">--</div><div class="cd-label">Days</div></div><div class="cd-block"><div class="cd-val" id="cd-h">--</div><div class="cd-label">Hours</div></div><div class="cd-block"><div class="cd-val" id="cd-m">--</div><div class="cd-label">Min</div></div><div class="cd-block"><div class="cd-val" id="cd-s">--</div><div class="cd-label">Sec</div></div></div>`;}
  html+=`<div class="rsvp-section"><div class="rsvp-title">Who's Coming</div><div class="rsvp-grid">`;
  ALL_MEMBERS.forEach(n=>{const np=PROFILES[n];const status=rsvp[n];const isMe=n===u;const isTbd=MEMBERS_TBD.includes(n);
  // Interactive if: it's your own chip, OR you're Chris and it's a TBD member
  const canTap = isMe || (u==='Chris' && isTbd);
  if(canTap){
    html+=`<div style="text-align:center;opacity:${isTbd?.8:1}">
      <div style="font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:${np.color};margin-bottom:4px">${n}${isTbd?'*':''}</div>
      <div style="display:flex;gap:4px;justify-content:center">
        <span class="rsvp-chip${status==='yes'?' yes':''} mine" style="${status==='yes'?`border-color:${np.color};color:${np.color}`:''}"><span class="rsvp-yes" data-member="${n}">✓</span></span>
        <span class="rsvp-chip${status==='no'?' no':''} mine"><span class="rsvp-no" data-member="${n}">✗</span></span>
      </div>
    </div>`;
  } else {
    html+=`<div style="text-align:center;opacity:${isTbd?.4:.65}">
      <div style="font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:${np.color};margin-bottom:4px">${n}${isTbd?'*':''}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:6px 12px;border:1px solid ${status==='yes'?np.border:status==='no'?'#6a2020':'#1a1200'};color:${status==='yes'?np.color:status==='no'?'#cc5050':'#2a1f00'};background:${status==='yes'?np.bg:status==='no'?'#2a0a0a':'transparent'}">
        ${status==='yes'?'✓ Yes':status==='no'?'✗ No':'—'}
      </div>
    </div>`;
  }
});
  html+=`</div></div>`;
  if(canSchedule)html+=`<div style="display:flex;gap:8px;justify-content:center;margin-top:.5rem">
    <button class="btn-gold" id="schedule-btn">Change Screening</button>
    <button class="btn-r" id="clear-screening-btn">Clear</button>
  </div>`;
  const membershipHtml=buildMembershipPanel();
  if(membershipHtml.includes('panel-candidate')){
    html+=`<div style="margin-top:.5rem"><div style="font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#5a4020;cursor:pointer;text-align:center;padding:.4rem;border-top:1px solid #1a1200" id="toggle-panel-btn">Panel Review ▾</div><div id="panel-wrap" style="display:none">${membershipHtml}</div></div>`;
  }
  html+=`</div>`;
  return html;
}

function startCountdown() {
  if(state.countdownInterval)clearInterval(state.countdownInterval);
  function tick(){
    if(!state.screening)return;
    const diff=new Date(state.screening.showtime).getTime()-Date.now();
    if(diff<=0){clearInterval(state.countdownInterval);render();return;}
    const pad=n=>String(n).padStart(2,'0');
    const d=Math.floor(diff/86400000);const h=Math.floor((diff%86400000)/3600000);const m=Math.floor((diff%3600000)/60000);const s=Math.floor((diff%60000)/1000);
    const dEl=document.getElementById('cd-d');const hEl=document.getElementById('cd-h');const mEl=document.getElementById('cd-m');const sEl=document.getElementById('cd-s');
    if(dEl)dEl.textContent=d;if(hEl)hEl.textContent=pad(h);if(mEl)mEl.textContent=pad(m);if(sEl)sEl.textContent=pad(s);
  }
  tick();state.countdownInterval=setInterval(tick,1000);
}

      html+=`<div class="whats-next-card">

        <div class="whats-next-meta">
          <div class="whats-next-rank" style="color:${rankColors[i]}">${rankLabels[i]} Choice</div>
          <div class="whats-next-title">${esc(m.title)}</div>
          <div class="whats-next-info">${[m.year,m.genre,m.director?'Dir. '+m.director:''].filter(Boolean).join(' · ')}</div>
          <div class="whats-next-score" style="color:${scoreColor}">Interest: ${m.score.toFixed(1)}</div>

async function saveDateRequest(date,time){if(!date||!time)return;const reqs={...((state.dateRequests&&state.dateRequests.requests)||{})};reqs[state.currentUser]={date,time};await setDoc(doc(db,'config','dateRequests'),{requests:reqs});}

/* ── SCHEDULE FORM ── */
function buildScheduleForm() {
  const preselect=state.fd&&state.fd._preselect;
  const now=new Date();const defaultDate=now.toISOString().slice(0,10);
  return `<div class="form-box">
    <div class="form-title">Schedule Screening</div>
    <div class="field"><label>Select Film from Queue</label>
      <select id="s-film">
        <option value="">— Choose a film —</option>
        ${[...state.watchlist].sort((a,b)=>getInterestScore(b)-getInterestScore(a)).map(m=>{
          const score=getInterestScore(m);
          const label=score>0?` · ${score.toFixed(1)} ${getInterestLabel(score)}`:'';
          const autoSelect=preselect?preselect===m.id:getInterestScore(m)===Math.max(...state.watchlist.map(w=>getInterestScore(w)));
          return `<option value="${m.id}"${autoSelect?' selected':''}>${esc(m.title)}${label}</option>`;
        }).join('')}
      </select>
    </div>
    <div class="field"><label>Date</label><input type="date" id="s-date" value="${defaultDate}"/></div>
    <div class="field"><label>Doors Time</label><input type="time" id="s-doors" value="19:00"/></div>
    <div class="field"><label>Showtime</label><input type="time" id="s-show" value="19:30"/></div>
    <div class="form-actions">
      <button class="fbtn primary" id="schedule-submit">Schedule</button>
      <button class="fbtn cancel" id="schedule-cancel">Cancel</button>
    </div>
  </div>`;
}

async function submitSchedule() {
  const filmId=document.getElementById('s-film').value;const date=document.getElementById('s-date').value;const doors=document.getElementById('s-doors').value;const show=document.getElementById('s-show').value;
  if(!filmId||!date||!show)return;
  const film=state.watchlist.find(m=>m.id===filmId);if(!film)return;
  await setDoc(doc(db,'config','screening'),{movieId:film.id,title:film.title,poster:film.poster||null,year:film.year||'',genre:film.genre||'',doorsTime:new Date(`${date}T${doors}`).toISOString(),showtime:new Date(`${date}T${show}`).toISOString(),rsvp:{},watchedId:null,scheduledBy:state.currentUser,autoMoved:false});
  // Clear date requests when new screening is set
  await setDoc(doc(db,'config','dateRequests'),{requests:{}});
  await setDoc(doc(db,'config','screeningSeen'),{});
  state.showForm=false;state.tab='screening';state.fd={};
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===1));render();
}

async function clearScreening(){await deleteDoc(doc(db,'config','screening'));}
async function setRsvp(member,status){if(!state.screening)return;const rsvp={...(state.screening.rsvp||{})};rsvp[member]=rsvp[member]===status?null:status;await updateDoc(doc(db,'config','screening'),{rsvp});}

/* ── SCREENING EXPIRY ── */
function checkScreeningExpiry(){if(!state.screening)return;if(isExpired()&&state.screening.movieId&&!state.screening.autoMoved)handleScreeningExpiry();}
async function handleScreeningExpiry(){const sc=state.screening;if(!sc||sc.autoMoved)return;await updateDoc(doc(db,'config','screening'),{autoMoved:true});const film=state.watchlist.find(x=>x.id===sc.movieId);if(film&&!sc.watchedId){const newId='v'+Date.now();const batch=writeBatch(db);const screenedDate=new Date().toISOString();batch.set(doc(db,'watched',newId),{...film,id:newId,ratings:{},screenedDate});batch.delete(doc(db,'watchlist',sc.movieId));await batch.commit();await updateDoc(doc(db,'config','screening'),{watchedId:newId});}}

/* ── MEMBERSHIP ── */
async function castMembershipVote(candidate,vote){const current=state.membership||{votes:{}};const votes={...(current.votes||{})};if(!votes[candidate])votes[candidate]={};if(votes[candidate][state.currentUser]===vote)delete votes[candidate][state.currentUser];else votes[candidate][state.currentUser]=vote;await setDoc(doc(db,'config','membership'),{votes});}

function buildMembershipPanel(){const u=state.currentUser;const mv=(state.membership&&state.membership.votes)||{};const promoted=(state.membership&&state.membership.promoted)||{};const rsvp=(state.screening&&state.screening.rsvp)||{};const presentCandidates=MEMBERS_TBD.filter(n=>rsvp[n]==='yes'&&!promoted[n]);if(!presentCandidates.length)return '';let html=`<div class="panel-section"><div class="panel-title">Panel Review</div><div class="panel-sub">Cast your vote — unanimous approval required</div>`;presentCandidates.forEach(candidate=>{const cp=PROFILES[candidate];const cv=mv[candidate]||{};const ayeVoters=MEMBERS.filter(n=>cv[n]==='aye');const nayVoters=MEMBERS.filter(n=>cv[n]==='nay');const isUnanimous=ayeVoters.length===MEMBERS.length;const hasNay=nayVoters.length>0;const myVote=cv[u];const canVote=MEMBERS.includes(u);html+=`<div class="panel-candidate"><div class="panel-candidate-name" style="color:${cp.color}">${candidate}</div><div class="panel-candidate-alias">${cp.alias}</div><div class="panel-votes">${MEMBERS.map(n=>{const np=PROFILES[n];const v=cv[n];return `<span class="panel-vote-chip${v==='aye'?' aye':v==='nay'?' nay':''}" style="${v==='aye'?`border-color:${np.color};color:${np.color}`:''}" data-panel-voter="${n}" data-panel-candidate="${candidate}">${n} ${v==='aye'?'✓':v==='nay'?'✗':'?'}</span>`;}).join('')}</div>`;if(isUnanimous){html+=`<div class="panel-result unanimous">Unanimous — Approved</div>`;if(u==='Chris')html+=`<br><button class="panel-promote" data-promote="${candidate}">Promote to Full Member</button>`;}else if(hasNay){html+=`<div class="panel-result split">${nayVoters.length} Nay — Not Approved</div>`;}else{html+=`<div class="panel-result pending">${ayeVoters.length} / ${MEMBERS.length} Ayes</div>`;}if(canVote)html+=`<div style="display:flex;gap:6px;margin-top:.6rem"><button class="panel-vote-chip${myVote==='aye'?' aye':''}" data-panel-vote="aye" data-panel-candidate="${candidate}">Aye ${myVote==='aye'?'✓':''}</button><button class="pane async function fetchTMDB() {
  const title=(document.getElementById('f-title')?.value||'').trim();if(!title)return;
  state.fd.title=title;state.fd.status='Fetching…';render();
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&language=en-US&page=1`);
    const d=await r.json();const hit=d.results&&d.results[0];
    if(hit){
      state.fd.poster=hit.poster_path?TMDB_IMG+hit.poster_path:null;state.fd.year=hit.release_date?hit.release_date.slice(0,4):'';state.fd.tmdb=hit.vote_average?hit.vote_average.toFixed(1):null;
      if(!state.fd.notes&&hit.overview)state.fd.notes=hit.overview.slice(0,90)+(hit.overview.length>90?'…':'');
      try{
        const dr=await fetch(`https://api.themoviedb.org/3/movie/${hit.id}?api_key=${TMDB_KEY}&language=en-US&append_to_response=credits`);const dd=await dr.json();
        state.fd.genre=dd.genres&&dd.genres.length?dd.genres[0].name:'';
        const dir=dd.credits&&dd.credits.crew&&dd.credits.crew.find(c=>c.job==='Director');if(dir)state.fd.director=dir.name;
        if(dd.runtime)state.fd.runtime=dd.runtime;if(dd.tagline)state.fd.tagline=dd.tagline;if(dd.overview)state.fd.overview=dd.overview;
        if(dd.credits&&dd.credits.cast)state.fd.cast=dd.credits.cast.slice(0,4).map(a=>a.name).join(', ');
      }catch(e){}
      state.fd.status='';
    }else{state.fd.status='Not found — add manually.';}
  }catch(e){state.fd.status='Fetch failed.';}
  render();
}

/* ── SUMMARY ── */
function buildSummary() {
  const m=state.watched.find(x=>x.id===state.summaryId);if(!m)return `<div class="empty-msg">Film not found.</div>`;
  const u=state.currentUser;const r=m.ratings||{};const comments=m.comments||{};
  const memberScores=MEMBERS.map(n=>({name:n,score:r[n]||null})).filter(x=>x.score);const vals=memberScores.map(x=>x.score);
  const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
  const sorted=[...memberScores].sort((a,b)=>b.score-a.score);const highest=sorted[0];const lowest=sorted[sorted.length-1];
  const spread=highest&&lowest&&highest.name!==lowest.name?highest.score-lowest.score:0;
  let closestPair=null,closestDiff=99,biggestPair=null,biggestDiff=0;
  for(let i=0;i<memberScores.length;i++)for(let j=i+1;j<memberScores.length;j++){const diff=Math.abs(memberScores[i].score-memberScores[j].score);if(diff<closestDiff){closestDiff=diff;closestPair=[memberScores[i].name,memberScores[j].name];}if(diff>biggestDiff){biggestDiff=diff;biggestPair=[memberScores[i].name,memberScores[j].name];}}
  const pickerP=PROFILES[m.picker]||PROFILES['Chris'];
  let html=`<div style="flex-shrink:0;padding:.75rem .9rem .5rem;border-bottom:1px solid #1a1200;display:flex;align-items:center;justify-content:space-between">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:#F5C842">Summary</div>
    <div style="font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:#5a4020;cursor:pointer" id="summary-back">← Back</div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:.75rem .9rem;-webkit-overflow-scrolling:touch"><div class="summary-wrap">`;
  html+=m.poster?`<img class="summary-poster" src="${m.poster}" alt="${esc(m.title)}" loading="lazy"/>`:`<div class="summary-poster-ph">🎬</div>`;
  html+=`<div class="summary-title">${esc(m.title)}</div><div class="summary-sub">${m.year||''}${m.year&&m.genre?' · ':''}${m.genre||''} · <span style="color:${pickerP.color}">${m.picker}'s pick</span></div>`;
  if(avg)html+=`<div class="summary-avg">${avg}</div><div class="summary-avg-label">Club Average</div>`;
  html+=`<div class="summary-scores">${MEMBERS.map(n=>{const np=PROFILES[n];const score=r[n];return `<div class="ss-cell" style="border-color:${np.border};background:${np.bg}"><div class="ss-name" style="color:${np.color}">${n}</div><div class="ss-score" style="color:${score?np.color:'#3a2f00'}">${score||'—'}</div></div>`;}).join('')}</div>`;
  if(highest&&lowest&&highest.name!==lowest.name)html+=`<div class="summary-stat"><div class="summary-stat-label">Highest Score</div><div class="summary-stat-val" style="color:${PROFILES[highest.name].color}">${highest.name} — ${highest.score}/10</div></div><div class="summary-stat"><div class="summary-stat-label">Lowest Score</div><div class="summary-stat-val" style="color:${PROFILES[lowest.name].color}">${lowest.name} — ${lowest.score}/10</div></div>`;
  if(spread>0)html+=`<div class="summary-stat"><div class="summary-stat-label">Score Spread</div><div class="summary-stat-val">${spread} pts — ${spread>=4?'Controversial':'Consensus'}</div></div>`;
  if(biggestPair&&biggestDiff>=2)html+=`<div class="summary-stat"><div class="summary-stat-label">Biggest Disagreement</div><div class="summary-stat-val"><span style="color:${PROFILES[biggestPair[0]].color}">${biggestPair[0]}</span> vs <span style="color:${PROFILES[biggestPair[1]].color}">${biggestPair[1]}</span> (${biggestDiff} pts apart)</div></div>`;
  if(closestPair&&closestDiff===0)html+=`<div class="summary-stat"><div class="summary-stat-label">Perfect Agreement</div><div class="summary-stat-val"><span style="color:${PROFILES[closestPair[0]].color}">${closestPair[0]}</span> & <span style="color:${PROFILES[closestPair[1]].color}">${closestPair[1]}</span> — identical scores</div></div>`;
  else if(closestPair)html+=`<div class="summary-stat"><div class="summary-stat-label">Closest Scores</div><div class="summary-stat-val"><span style="color:${PROFILES[closestPair[0]].color}">${closestPair[0]}</span> & <span style="color:${PROFILES[closestPair[1]].color}">${closestPair[1]}</span> (${closestDiff} pt apart)</div></div>`;
  if(m.tmdb)html+=`<div class="summary-stat"><div class="summary-stat-label">TMDB Rating</div><div class="summary-stat-val">${m.tmdb}/10 — Club ${avg&&parseFloat(avg)>parseFloat(m.tmdb)?'rated higher':'rated lower'} than audiences</div></div>`;

  // One-liners
  const hasComments = ALL_MEMBERS.some(n=>comments[n]);
  if(hasComments||true) {
    html+=`<div style="margin-top:1rem;text-align:left">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:4px;color:#7a6030;margin-bottom:.6rem;display:flex;align-items:center;gap:8px">One-Liners<span style="flex:1;height:1px;background:#1a1200;display:block"></span></div>`;
    // Show all members — textarea for current user, read-only for others
    ALL_MEMBERS.forEach(n=>{
      const np=PROFILES[n];const isMe=n===u;const text=comments[n]||'';
      if(isMe){
        html+=`<div style="margin-bottom:.5rem">
          <div style="font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:${np.color};margin-bottom:3px">${n}</div>
          <div class="one-liner-input-row">
            <textarea class="one-liner-textarea" placeholder="Your one-liner..." data-id="${m.id}" data-member="${n}" maxlength="120" rows="2">${esc(text)}</textarea>
            <button class="one-liner-submit" data-submit-id="${m.id}" data-submit-member="${n}">✓</button>
          </div>
        </div>`;
      } else if(text) {
        html+=`<div class="comment-row"><div class="comment-name" style="color:${np.color}">${n}</div><div class="comment-text">"${esc(text)}"</div></div>`;
      }
    });
    html+=`</div>`;
  }

  return html+'</div></div></div>';
}

async function saveScore(id,member,val){const v=parseInt(val);const m=state.watched.find(x=>x.id===id);if(!m)return;const ratings={...(m.ratings||{})};if(v>=1&&v<=10)ratings[member]=v;else delete ratings[member];await updateDoc(doc(db,'watched',id),{ratings});const vals=MEMBERS.map(n=>ratings[n]).filter(v=>v>0);const el=document.getElementById('avg-'+id);if(el){if(vals.length){el.textContent='Club Avg: '+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)+' / 10';el.className='avg-line';}else{el.textContent='No scores yet';el.className='avg-line empty';}}}
async function castInterestVote(id,val){const m=state.watchlist.find(x=>x.id===id);if(!m)return;const iv={...(m.interestVotes||{})};if(iv[state.currentUser]===val)delete iv[state.currentUser];else iv[state.currentUser]=val;await updateDoc(doc(db,'watchlist',id),{interestVotes:iv});}
async function saveComment(id,member,val){const text=val.trim().slice(0,80);const m=state.watched.find(x=>x.id===id);if(!m)return;const comments={...(m.comments||{})};if(text)comments[member]=text;else delete comments[member];await updateDoc(doc(db,'watched',id),{comments});}

function showConfirm(id,list){
  const m=list==='watchlist'?state.watchlist.find(x=>x.id===id):state.watched.find(x=>x.id===id);if(!m)return;
  const overlay=document.createElement('div');overlay.className='confirm-overlay';
  overlay.innerHTML=`<div class="confirm-box"><div class="confirm-title">Remove Film?</div><div class="confirm-sub"><em style="color:#b89a40">${esc(m.title)}</em><br><br>This cannot be undone.</div><div class="confirm-actions"><button class="btn-r" id="c-yes">Remove</button><button class="fbtn cancel" id="c-no">Cancel</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#c-no').addEventListener('click',()=>overlay.remove());
  overlay.querySelector('#c-yes').addEventListener('click',()=>{
    overlay.innerHTML=`<div class="confirm-box"><div class="confirm-title" style="color:#cc5050">Are You Sure?</div><div class="confirm-sub" style="line-height:1.7"><span style="font-size:16px">⚠️</span><br>Chris will be mad if you remove<br><em style="color:#b89a40">${esc(m.title)}</em><br>by mistake.</div><div class="confirm-actions"><button class="btn-r" id="c-final">Yes, Remove It</button><button class="fbtn cancel" id="c-no2">Cancel</button></div></div>`;
    overlay.querySelector('#c-no2').addEventListener('click',()=>overlay.remove());
    overlay.querySelector('#c-final').addEventListener('click',()=>{del(id,list);overlay.remove();});
  });
}

  {name:"Céline Sciamma",       id:1027521},
  {name:"Agnès Varda",          id:1706},
];

// Cache per tab so we don't re-fetch
window._researchCache = window._researchCache || {};

async function fetchClubPicksTab() {
  if(window._researchCache['clubpicks']&&window._researchCache['clubpicks'].length) return window._researchCache['clubpicks'];
  // Get unique directors from watched films
  const seen = new Set([...state.watchlist,...state.watched].map(m=>m.title.toLowerCase()));
  const watchedDirs = [...new Set(state.watched.map(m=>m.director).filter(Boolean))];
  if(!watchedDirs.length) return [];
  // Fetch films for each director, collect unseen ones
  const allFilms = [];
  await Promise.all(watchedDirs.slice(0,6).map(async dirName => {
    try {
      const sp = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_KEY}&query=${encodeURIComponent(dirName)}&language=en-US`);
      const sd = await sp.json();
      const person = (sd.results||[]).find(p=>p.known_for_department==='Directing')||(sd.results||[])[0];
      if(!person) return;
      const rm = await fetch(`https://api.themoviedb.org/3/person/${person.id}/movie_credits?api_key=${TMDB_KEY}`);
      const dm = await rm.json();
      const films = (dm.crew||[])
        .filter(m=>m.job==='Director'&&m.poster_path&&!seen.has((m.title||'').toLowerCase()))
        .sort((a,b)=>(b.vote_count||0)-(a.vote_count||0))
        .slice(0,4);
      allFilms.push(...films);
    } catch(e) {}
  }));
  // Dedupe and sort by vote count
  const dedupedIds = new Set();
  const result = allFilms
    .filter(m=>{ if(dedupedIds.has(m.id)) return false; dedupedIds.add(m.id); return true; })
    .sort((a,b)=>(b.vote_count||0)-(a.vote_count||0))
    .slice(0,18);
  window._researchCache['clubpicks'] = result;
  return result;
}

async function fetchResearchTab(tab) {
  if(window._researchCache[tab]&&window._researchCache[tab].length) return window._researchCache[tab];
  const base = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_KEY}&language=en-US`;
  // Use | (OR) separator for genres — more results than comma (AND)
  // Exclude: Animation=16, Family=10751, Comedy=35, Romance=10749
  const exclude = '16%2C10751%2C35%2C10749';
  const goodGenres = '18%2C80%2C53%2C9648%2C36%2C10752'; // Drama,Crime,Thriller,Mystery,History,War
  let url = '';
  if(tab==='acclaimed')
    url=`${base}&sort_by=vote_average.desc&vote_count.gte=3000&with_genres=18&without_genres=16%2C10751%2C35%2C10749&vote_average.gte=7.5`;
  if(tab==='newreleases')
    url=`${base}&sort_by=primary_release_date.desc&vote_count.gte=200&with_genres=18%2C80%2C53&without_genres=16%2C10751%2C35%2C10749&primary_release_date.gte=2022-01-01&vote_average.gte=6.5`;
  if(tab==='worldcinema')
    url=`${base}&sort_by=vote_average.desc&vote_count.gte=500&with_original_language=fr%7Cit%7Cja%7Cko%7Cde%7Ces%7Cpt%7Czh%7Cru%7Cfa&vote_average.gte=7.0`;
  if(tab==='classic')
    url=`${base}&sort_by=vote_average.desc&vote_count.gte=500&primary_release_date.lte=1979-12-31&with_genres=18%2C80%2C53&without_genres=16%2C10751%2C35&vote_average.gte=7.5`;
  if(!url) return [];
  try {
    const r = await fetch(url);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    const films = (d.results||[]).filter(m=>m.poster_path);
    window._researchCache[tab] = films;
    return films;
  } catch(e) {
    console.warn('Research tab error:', tab, e);
    return [];
  }
}

async function fetchDirectorFilms(personId, directorName) {
  const key = 'dir_'+personId;
  if(window._researchCache[key]) return window._researchCache[key];
  try {
    // First verify the person ID is correct by searching for the director name
    let verifiedId = personId;
    if(directorName) {
      try {
        const sp = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_KEY}&query=${encodeURIComponent(directorName)}&language=en-US`);
        const sd = await sp.json();
        const match = (sd.results||[]).find(p=>p.known_for_department==='Directing')||(sd.results||[])[0];
        if(match) verifiedId = match.id;
      } catch(e) {}
    }
    const r = await fetch(`https://api.themoviedb.org/3/person/${verifiedId}/movie_credits?api_key=${TMDB_KEY}`);
    const d = await r.json();
    let films = (d.crew||[]).filter(m=>m.job==='Director'&&m.poster_path);
    if(!films.length) films = (d.crew||[]).filter(m=>m.department==='Directing'&&m.poster_path);
    films = films
      .sort((a,b)=>(b.vote_count||0)-(a.vote_count||0))
      .filter((m,i,arr)=>arr.findIndex(x=>x.id===m.id)===i)
      .slice(0,18);
    window._researchCache[key] = films;
    return films;
  } catch(e) { return []; }
}

function buildResearchFilmGrid(films, seen) {
  if(!films.length) return `<div class="research-loading">Loading...</div>`;
  return `<div class="research-grid">${films.slice(0,18).map(m=>{
    const q = seen.has((m.title||'').toLowerCase());
    return `<div class="research-card" data-r-id="${m.id}">
      <img src="https://image.tmdb.org/t/p/w300${m.poster_path}" alt="" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="research-card-ph" style="display:none">🎬</div>
      ${q?`<div class="research-card-queued">✓</div>`:''}
      <div class="research-card-info">
        <div class="research-card-title">${esc(m.title||'')}</div>
        <div class="research-card-year">${m.release_date?m.release_date.slice(0,4):''}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function buildResearch() {
  const rs = state.research || {};
  const mode = rs.mode || 'home';
  const seen = new Set([...state.watchlist,...state.watched].map(m=>m.title.toLowerCase()));
  let html = `<div>`;

  // Persistent top bar
  html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:#F5C842">Discover</div>
    <span id="r-exit" style="font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;color:#7a6030;cursor:pointer">← To Watch</span>
  </div>`;

  if(mode === 'detail') {
    const m = rs.selected; const d = rs.detail;
    if(!m) { html+=`</div>`; return html; }
    const q = seen.has((m.title||'').toLowerCase());
    const poster = m.poster_path?`https://image.tmdb.org/t/p/w300${m.poster_path}`:null;
    const genre = d?.genres?.[0]?.name||'';
    const director = d?.credits?.crew?.find(c=>c.job==='Director')?.name||'';
    const runtime = d?.runtime||null;
    const tagline = d?.tagline||'';
    const overview = d?.overview||m.overview||'';
    const cast = d?.credits?.cast?.slice(0,4).map(a=>a.name).join(', ')||'';
    const score = d?.vote_average||m.vote_average||null;
    html += `<div style="font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#5a4020;cursor:pointer;margin-bottom:.75rem" id="r-back">← Back</div>
    <div class="research-detail">
      <div class="research-detail-top">
        <div class="research-detail-poster">${poster?`<img src="${poster}" alt="" loading="lazy"/>`:`<div class="research-detail-poster-ph">🎬</div>`}</div>
        <div class="research-detail-meta">
          <div class="research-detail-title">${esc(m.title||'')}</div>
          <div class="research-detail-sub">${[m.release_date?m.release_date.slice(0,4):'',genre,director?'Dir. '+director:'',runtime?runtime+'m':''].filter(Boolean).join(' · ')}</div>
          ${score?`<div style="margin-top:6px"><span class="badge">TMDB ${parseFloat(score).toFixed(1)}</span></div>`:''}
        </div>
      </div>
      ${tagline?`<div class="research-detail-tagline">"${esc(tagline)}"</div>`:''}
      ${rs.loadingDetail?`<div class="research-loading">Loading details...</div>`:''}
      ${overview?`<div class="research-detail-overview">${esc(overview)}</div>`:''}
      ${cast?`<div style="margin-bottom:.9rem"><div class="expand-label" style="margin-bottom:5px">Cast</div><div class="cast-chips">${cast.split(', ').map(a=>`<span class="cast-chip">${esc(a)}</span>`).join('')}</div></div>`:''}
      <button class="research-queue-btn${q?' queued':''}" id="r-queue-btn" ${q?'disabled':''}>
        ${q?'✓ Already in Queue':'+ Add to To Watch'}
      </button>
    </div>`;

  } else if(mode === 'director') {
    const dir = rs.selectedDirector;
    html += `<div style="font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#5a4020;cursor:pointer;margin-bottom:.75rem" id="r-back">← Back</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:#F9F0DC;margin-bottom:.75rem">${esc(dir?.name||'')}</div>`;
    if(rs.loading) html += `<div class="research-loading">Loading filmography...</div>`;
    else html += buildResearchFilmGrid(rs.films||[], seen);

  } else {
    // Home — tabs + grid
    const tab = rs.tab || 'toprated';
    const tabs = [
      {key:'clubpicks',   label:"Club Picks"},
      {key:'acclaimed',   label:'Acclaimed'},
      {key:'newreleases', label:'New'},
      {key:'worldcinema', label:'World'},
      {key:'classic',     label:'Classic'},
      {key:'director',    label:'Director'},
    ];
    html += `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.9rem">
      ${tabs.map(t=>`<div class="research-tab${tab===t.key?' active':''}" data-r-tab="${t.key}">${t.label}</div>`).join('')}
    </div>`;

    if(tab === 'director') {
      html += `<div style="margin-bottom:.5rem">`;
      RESEARCH_DIRECTORS.forEach(dir=>{
        html += `<div class="research-director-row" data-r-dir-id="${dir.id}" data-r-dir-name="${esc(dir.name)}">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:#F9F0DC">${esc(dir.name)}</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;color:#5a3a00">→</div>
        </div>`;
      });
      html += `</div>`;
    } else {
      if(rs.loading) html += `<div class="research-loading">Loading...</div>`;
      else html += buildResearchFilmGrid(rs.films||[], seen);
    }
  }

  html += `</div>`;
  return html;
}

function bindResearch() {
  const rs = state.research || {};
  const mode = rs.mode || 'home';

  document.getElementById('r-exit')?.addEventListener('click',()=>{
    state.showForm=false; state.research={mode:'home',tab:'clubpicks'}; render();
  });

  document.getElementById('r-back')?.addEventListener('click',()=>{
    state.research.mode='home'; state.research.selected=null; state.research.detail=null;
    // Reload the tab's films
    const tab=state.research.tab||'acclaimed';
    if(tab!=='director') {
      const cached=window._researchCache[tab];
      state.research.films=cached||[];
      if(!cached){state.research.loading=true;fetchResearchTab(tab).then(f=>{state.research.films=f;state.research.loading=false;if(state.showForm==='research')render();});}
    }
    render();
  });

  // Tab switching
  document.querySelectorAll('[data-r-tab]').forEach(el=>{
    el.addEventListener('click',()=>{
      const tab=el.dataset.rTab;
      state.research.tab=tab;
      state.research.films=[];
      if(tab==='director'){render();return;}
      const cached=window._researchCache[tab];
      if(cached&&cached.length){
        state.research.films=cached;state.research.loading=false;render();
      } else {
        state.research.loading=true;render();
        const fetcher=tab==='clubpicks'?fetchClubPicksTab():fetchResearchTab(tab);
        fetcher.then(f=>{
          state.research.films=f;state.research.loading=false;
          if(state.showForm==='research')render();
        });
      }
    });
  });

  // Director row
  document.querySelectorAll('[data-r-dir-id]').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=parseInt(el.dataset.rDirId);const name=el.dataset.rDirName;
      state.research.mode='director';state.research.selectedDirector={id,name};
      state.research.films=[];state.research.loading=true;render();
      fetchDirectorFilms(id, name).then(f=>{state.research.films=f;state.research.loading=false;if(state.showForm==='research')render();});
    });
  });

  // Film card tap
  document.querySelectorAll('[data-r-id]').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=parseInt(el.dataset.rId);
      const m=(rs.films||[]).find(x=>x.id===id);
      if(!m)return;
      state.research.selected=m;state.research.mode='detail';
      state.research.detail=null;state.research.loadingDetail=true;render();
      fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_KEY}&language=en-US&append_to_response=credits`)
        .then(r=>r.json()).then(d=>{state.research.detail=d;state.research.loadingDetail=false;if(state.showForm==='research')render();})
        .catch(()=>{state.research.loadingDetail=false;if(state.showForm==='research')render();});
    });
  });

  // Queue
  document.getElementById('r-queue-btn')?.addEventListener('click',async()=>{
    const m=state.research.selected;const d=state.research.detail;if(!m)return;
    const id='w'+Date.now();
    const maxOrder=state.watchlist.reduce((max,w)=>Math.max(max,w.sortOrder||0),0);
    const director=d?.credits?.crew?.find(c=>c.job==='Director')?.name||'';
    const genre=d?.genres?.[0]?.name||'';
    const cast=d?.credits?.cast?.slice(0,4).map(a=>a.name).join(', ')||'';
    await setDoc(doc(db,'watchlist',id),{
      id,title:m.title||'',year:m.release_date?m.release_date.slice(0,4):'',
      picker:state.currentUser,priority:'med',notes:'',
      poster:m.poster_path?TMDB_IMG+m.poster_path:null,
      genre,tmdb:d?.vote_average?d.vote_average.toFixed(1):null,
      director,runtime:d?.runtime||null,tagline:d?.tagline||'',
      overview:d?.overview||'',cast,votes:{},interestVotes:{},sortOrder:maxOrder+10
    });
    state.showForm=false;state.research={mode:'home',tab:'clubpicks'};
    state.tab='watchlist';
    document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===2));
    render();
  });

  // Load initial tab if needed
  if(mode==='home') {
    const tab=rs.tab||'clubpicks';
    if(tab!=='director'&&!rs.films?.length&&!rs.loading){
      const cached=window._researchCache[tab];
      if(cached&&cached.length){state.research.films=cached;}
      else{state.research.loading=true;
        const fetcher=tab==='clubpicks'?fetchClubPicksTab():fetchResearchTab(tab);
        fetcher.then(f=>{state.research.films=f;state.research.loading=false;if(state.showForm==='research')render();});
      }
    }
  }
}

document.addEventListener('click',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  const btn=e.target.closest('.expand-btn');if(!btn)return;
  e.preventDefault();e.stopPropagation();
  const id=btn.dataset.expandId;
  const panel=document.getElementById('expand-'+id);const arrow=document.getElementById('arrow-'+id);
  if(!panel)return;
  const isOpen=panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  if(arrow)arrow.classList.toggle('open',!isOpen);
});


const SCORE_TIERS = [
  {cls:'s4', stars:'★★★★', label:'Masterpiece', range:'9 – 10', value:10, min:9},
  {cls:'s3', stars:'★★★',  label:'Great',        range:'7 – 8',  value:8,  min:7},
  {cls:'s2', stars:'★★',   label:'Good',          range:'5 – 6',  value:6,  min:5},
  {cls:'s1', stars:'★',    label:'Meh',           range:'1 – 4',  value:3,  min:1},
];
function getTierFromScore(score) {
  if(!score) return null;
  const s = parseInt(score);
  if(s >= 9) return 's4';
  if(s >= 7) return 's3';
  if(s >= 5) return 's2';
  return 's1';
}
function buildScoreTierGrid(movieId, member, currentScore) {
  const tier = getTierFromScore(currentScore);
  return `<div class="score-tier-grid">
    ${SCORE_TIERS.map(t=>`<div class="score-tier${tier===t.cls?' selected-'+t.cls:''}" data-score-id="${movieId}" data-score-member="${member}" data-score-val="${t.value}">
      <div class="score-tier-stars">${t.stars}</div>
      <div class="score-tier-label">${t.label}</div>
      <div class="score-tier-range">${t.range}</div>
    </div>`).join('')}
  </div>`;
}
function buildScoreMemberGrid(m, u, r) {
  return `<div class="score-member-grid">
    ${[...MEMBERS,...MEMBERS_TBD].map(n=>{
      const np=PROFILES[n];const isMe=n===u;const score=r[n]||null;
      const tier=getTierFromScore(score);
      const tierData=SCORE_TIERS.find(t=>t.cls===tier);
      return `<div class="score-member-cell${isMe?' mine':''}" style="${isMe?`border-color:${np.color};background:${np.bg}`:''}">
        <div class="score-member-name" style="${isMe?`color:${np.color}`:''}\">${n}</div>
        <div class="score-member-val" style="color:${score?(isMe?np.color:'#b89a40'):'#2a1f00'}">${score||'—'}</div>
        ${tierData&&score?`<div style="font-size:9px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:${isMe?np.color:'#5a4020'};margin-top:2px">${tierData.label}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}
