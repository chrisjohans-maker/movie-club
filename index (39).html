<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Chris's Movie Club</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Movie Club">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0A0500">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0A0500}
body{font-family:'Special Elite',serif;color:#F9F0DC}

/* ── APP SHELL ── */
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.header{flex-shrink:0;text-align:center;padding:.6rem 1rem .45rem;border-bottom:1px solid #1a1200;position:relative;background:#0A0500}
.header-rule{height:1px;background:linear-gradient(to right,transparent,#5a3a00,#F5C842,#5a3a00,transparent);margin:.35rem 0}
.club-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:6px;color:#F5C842;text-shadow:0 0 20px rgba(245,200,66,.2)}
.club-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:#b89a40;margin-top:2px}
.club-members{font-size:10px;color:#5a4020;letter-spacing:2px;margin-top:2px}
.bulb-row{display:flex;justify-content:center;gap:11px;padding:2px 0}
.bulb{width:9px;height:9px;border-radius:50%;background:#FFF8C0;transition:opacity .18s}
.bulb.on{opacity:.9}.bulb.dim{opacity:.08}
.avatar{position:absolute;top:.45rem;right:.75rem;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;border:2px solid;flex-shrink:0}
.marquee-bar{flex-shrink:0;background:#100800;border-top:1px solid #1a1200;border-bottom:1px solid #1a1200;padding:.45rem 0;overflow:hidden}
.marquee-inner{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:#F5C842;white-space:nowrap;animation:marquee 24s linear infinite}
@keyframes marquee{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:.7rem .85rem 1rem}
.content::-webkit-scrollbar{display:none}
.nav{flex-shrink:0;display:flex;background:#080400;border-top:1px solid #1a1200}
.nav-btn{flex:1;padding:16px 2px 13px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:#4a3010;cursor:pointer;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.nav-btn.active{color:#F5C842}
.nav-icon{font-size:21px;line-height:1}
.nav-dot{width:5px;height:5px;border-radius:50%;background:#F5C842;position:absolute;top:8px;right:calc(50% - 13px);display:none}
.nav-dot.show{display:block}

/* ── IDENTITY ── */
.identity{position:fixed;inset:0;background:#0A0500;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center;max-width:480px;margin:0 auto;overflow-y:auto}
.id-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:6px;color:#F5C842;margin-bottom:.4rem}
.id-rule{height:1px;background:linear-gradient(to right,transparent,#F5C842,transparent);margin:.4rem 0 .9rem}
.id-welcome{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#b89a40;margin-bottom:.4rem;line-height:1.7}
.id-prompt{font-size:11px;color:#5a4020;font-style:italic;margin-bottom:1.4rem;line-height:1.6}
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:320px;margin-bottom:.9rem}
.mc{border:2px solid;padding:.9rem;cursor:pointer;text-align:center;border-radius:2px;transition:opacity .12s}
.mc:active{opacity:.7}
.mc-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:3px}
.mc-alias{font-family:'Playfair Display',serif;font-style:italic;font-size:10px;color:#7a6030}
.tbd-label{font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:3px;color:#3a2f00;margin-bottom:.5rem}
.tbd-grid{display:flex;gap:8px;justify-content:center}
.tbd-card{border:1px solid #2a1f00;padding:.5rem .8rem;cursor:pointer;text-align:center;opacity:.55;transition:opacity .12s}
.tbd-card:active{opacity:.35}
.tbd-name{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:#5a4020}
.tbd-alias{font-size:9px;color:#3a2f00;font-style:italic}

/* ── SECTION HEADERS ── */
.sh{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:4px;color:#6a5030;margin:.75rem 0 .4rem;display:flex;align-items:center;gap:7px}
.sh::after{content:'';flex:1;height:1px;background:#1a1000}

/* ── CARDS ── */
.card{background:#100800;border:1px solid #221500;padding:.65rem .75rem;margin-bottom:7px}
.card.gold-border{border-color:#7a5a00}
.card.screening-card{border-color:#F5C842;border-width:1.5px}
.ct{display:flex;gap:9px;margin-bottom:6px}
.poster{width:48px;height:70px;object-fit:cover;object-position:top;flex-shrink:0;border:1px solid #1a1200;background:#080400;display:block}
.poster-ph{width:48px;height:70px;flex-shrink:0;border:1px solid #1a1200;background:#080400;display:flex;align-items:center;justify-content:center;font-size:16px;color:#1a1200}
.cm{flex:1;min-width:0}
.ft{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:#F9F0DC;line-height:1.2;margin-bottom:2px}
.fy{font-size:11px;color:#6a5020;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.fg{font-size:11px;color:#4a3820}
.fd{font-size:11px;color:#3a2f00;font-style:italic;margin-top:1px}
.fta{font-size:11px;color:#4a3820;font-style:italic;margin-top:2px;line-height:1.3}
.pill{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;padding:3px 6px;border:1px solid;display:inline-block;margin-top:3px}
.badge-tmdb{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:3px 6px;border:1px solid #1a4060;color:#4090c0;display:inline-block;margin-top:3px}
.card-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.pips{display:flex;gap:3px;margin-top:3px}
.pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.interest-score{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;margin-top:4px}

/* ── INTEREST TIERS ── */
.tier-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:7px}
.tier{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 5px;border:1px solid #221500;background:#080400;cursor:pointer;gap:3px;transition:opacity .1s,transform .1s}
.tier:active{transform:scale(.95)}
.tier-icon{font-size:17px;line-height:1}
.tier-name{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px}
.tier-sub{font-size:10px;font-style:italic}
.tier.t4.sel{border-color:#7a5a00;background:#1e1000}
.tier.t3.sel{border-color:#3a6000;background:#0c1800}
.tier.t2.sel{border-color:#1a4060;background:#001420}
.tier.t1.sel{border-color:#5a2020;background:#180606}

/* ── SCORE TIERS ── */
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.stier{display:flex;flex-direction:row;align-items:center;padding:9px 10px;border:1px solid #221500;background:#080400;cursor:pointer;gap:10px;transition:transform .1s}
.stier:active{transform:scale(.97)}
.stier-stars{font-size:12px;line-height:1;flex-shrink:0;width:52px;text-align:left;letter-spacing:1px;color:#F9F0DC}
.stier-name{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;flex:1;color:#F9F0DC;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stier-range{font-size:10px;font-style:italic;color:#6a5030;flex-shrink:0}
.stier.s4.sel{border-color:#7a5a00;background:#1e1000}
.stier.s3.sel{border-color:#3a6000;background:#0c1800}
.stier.s2.sel{border-color:#1a4060;background:#001420}
.stier.s1.sel{border-color:#5a2020;background:#180606}

/* ── MEMBER SCORE GRID ── */
.mscore-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:6px}
.mscore-tbd{display:grid;grid-template-columns:repeat(2,1fr);gap:3px;margin-top:3px;opacity:.5}
.msc{border:1px solid #1a1200;background:#0a0500;padding:6px 4px;text-align:center}
.msc.me{border-width:1.5px}
.msc-name{font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:1px;margin-bottom:1px}
.msc-val{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}
.msc-tier{font-size:8px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;margin-top:1px}
.avg-bar{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;color:#4a3820;margin-top:.35rem}
.avg-bar.has{color:#b89a40}

/* ── EXPAND ── */
.expand-btn{display:flex;align-items:center;gap:5px;margin-top:7px;padding:5px 0;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#6a5030;border-top:1px solid #1a1000;user-select:none}
.expand-btn:active{color:#F5C842}
.expand-panel{display:none;padding:7px 0 3px}
.expand-panel.open{display:block}
.ep-label{font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:3px;color:#5a4020;margin-bottom:2px}
.ep-text{font-size:11px;color:#6a5030;line-height:1.6;margin-bottom:.4rem}
.cast-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;margin-bottom:.4rem}
.cast-chip{font-size:8px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:2px 5px;border:1px solid #1a1200;color:#4a3820}

/* ── ONE-LINERS ── */
.ol-section{margin-top:.65rem}
.ol-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#6a5030;margin-bottom:.4rem;display:flex;align-items:center;gap:7px}
.ol-label::after{content:'';flex:1;height:1px;background:#1a1000}
.ol-mine{background:#080400;border:1px solid #1a1200;padding:.5rem}
.ol-mine-who{font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:2px;margin-bottom:.3rem}
.ol-row{display:flex;gap:5px;align-items:flex-end}
.ol-ta{flex:1;background:#050300;border:1px solid #2a2000;color:#F9F0DC;font-family:'Special Elite',serif;font-size:12px;padding:6px 7px;outline:none;resize:none;min-height:36px;line-height:1.4;font-style:italic;border-radius:0}
.ol-ta:focus{border-color:#E8A020}
.ol-ta::placeholder{color:#2a1f00}
.ol-save{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:1px;padding:6px 8px;background:#102a00;color:#7de020;border:1px solid #3a7a10;cursor:pointer;white-space:nowrap}
.ol-saved{font-size:8px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#4a7a10;margin-top:2px}
.ol-others{margin-top:.4rem}
.ol-other{display:flex;gap:6px;padding:.3rem 0;border-bottom:1px solid #0a0600}
.ol-other:last-child{border-bottom:none}
.ol-who{font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:1px;min-width:48px;flex-shrink:0;margin-top:1px}
.ol-text{font-size:11px;color:#a07a30;font-style:italic;line-height:1.5}

/* ── CARD ACTIONS ── */
.card-actions{display:flex;gap:6px;margin-top:.5rem;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{font-family:'Bebas Neue',sans-serif;cursor:pointer;border:1px solid;padding:8px 12px;font-size:11px;letter-spacing:2px;background:transparent;transition:opacity .1s}
.btn:active{opacity:.75}
.btn-gold{color:#F5C842;border-color:#7a5a00;background:#1a1000}
.btn-green{color:#7de020;border-color:#4a8a10;background:#102a00}
.btn-red{color:#cc5050;border-color:#6a2020;background:#200808}
.btn-dim{color:#5a4020;border-color:#2a1f00;background:#080400}
.btn-wide{width:100%;padding:12px;text-align:center;justify-content:center;display:flex;align-items:center;gap:8px;font-size:13px;letter-spacing:3px;margin-bottom:6px}

/* ── HOME ── */
.user-panel{border:1px solid transparent;padding:.55rem .65rem;margin-bottom:.65rem}
.up-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;margin-bottom:1px}
.up-alias{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;margin-bottom:.45rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.stat{background:rgba(0,0,0,.35);padding:.4rem .25rem;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#F5C842;line-height:1}
.stat-label{font-size:7px;letter-spacing:2px;color:#4a3820;font-family:'Bebas Neue',sans-serif;margin-top:1px}
.pulse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:6px}
.pc{background:#100800;border:1px solid #1a1200;overflow:hidden;cursor:pointer;position:relative}
.pc:active{opacity:.8}
.pc-poster{width:100%;aspect-ratio:2/3;object-fit:cover;object-position:center}
.pc-ph{width:100%;height:105px;background:#080400;display:flex;align-items:center;justify-content:center;font-size:18px;color:#1a1200}
.pc-rank{position:absolute;top:3px;left:3px;font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:1px;padding:1px 4px;background:rgba(0,0,0,.85)}
.pc-info{padding:3px 4px 4px}
.pc-title{font-family:'Playfair Display',serif;font-size:9px;font-weight:700;color:#F9F0DC;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.pc-score{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:1px;margin-top:1px}
.nudge{display:flex;align-items:center;gap:9px;background:#100800;border:1px solid #1a1200;padding:.45rem .65rem;margin-bottom:5px;cursor:pointer}
.nudge:active{opacity:.8}
.nudge-poster{width:32px;height:47px;object-fit:cover;object-position:top;flex-shrink:0;border:1px solid #1a1200}
.nudge-ph{width:32px;height:47px;flex-shrink:0;border:1px solid #1a1200;background:#080400;display:flex;align-items:center;justify-content:center;font-size:12px;color:#1a1200}
.nudge-title{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;color:#F9F0DC;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nudge-cta{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;padding:4px 7px;border:1px solid;flex-shrink:0}

/* ── SCREENING TAB ── */
.sc-wrap{text-align:center;padding:.1rem 0}
.sc-poster{width:130px;margin:0 auto .6rem;display:block;border:1px solid #1a1200;aspect-ratio:2/3;object-fit:cover}
.sc-ph{width:130px;height:195px;margin:0 auto .6rem;border:1px solid #1a1200;background:#100800;display:flex;align-items:center;justify-content:center;font-size:26px;color:#1a1200}
.sc-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:#6a5030;margin-bottom:3px}
.sc-title{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;color:#F9F0DC;margin-bottom:2px;line-height:1.2}
.sc-sub{font-size:12px;color:#6a5020;font-style:italic;margin-bottom:.25rem}
.sc-date{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#F5C842;margin-bottom:1px}
.sc-times{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:#4a3820;margin-bottom:.4rem}
.live-badge{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;padding:3px 8px;background:#102a00;color:#7de020;border:1px solid #3a7a10;display:inline-block;margin-bottom:.4rem}
.countdown{display:flex;justify-content:center;gap:5px;margin-bottom:.45rem}
.cd{background:#100800;border:1px solid #1a1200;padding:5px 7px;min-width:40px;text-align:center}
.cd-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#F5C842;line-height:1}
.cd-label{font-family:'Bebas Neue',sans-serif;font-size:7px;letter-spacing:3px;color:#4a3820;margin-top:1px}
.rsvp-wrap{margin-bottom:.45rem}
.rsvp-title{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:#6a5030;margin-bottom:.4rem;display:flex;align-items:center;gap:7px}
.rsvp-title::after{content:'';flex:1;height:1px;background:#1a1200}
.rsvp-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.rsvp-member{text-align:center}
.rsvp-who{font-size:11px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;margin-bottom:4px}
.rsvp-chips{display:flex;gap:3px;justify-content:center}
.rsvp-chip{font-size:12px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;padding:6px 10px;border:1px solid #1a1200;cursor:pointer;background:transparent;color:#4a3020}
.rsvp-chip.yes{background:#102a00;color:#7de020;border-color:#3a7a10}
.rsvp-chip.no{background:#200808;color:#cc5050;border-color:#5a1818}
.rsvp-static{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;padding:6px 12px;border:1px solid #1a1200;color:#2a1f00}
.rsvp-static.yes{border-color:#3a5a10;color:#6a9a20;background:#081800}
.rsvp-static.no{border-color:#5a1818;color:#9a3030;background:#180606}

/* ── WHAT'S NEXT ── */
.wn-header{text-align:center;margin-bottom:.9rem}
.wn-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:5px;color:#F5C842;margin-bottom:3px}
.wn-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;color:#6a5030;margin-bottom:.65rem}
.wn-top{background:#180f00;border:1px solid #5a3a00;padding:.6rem .75rem;margin-bottom:.75rem;text-align:center}
.wn-top-label{font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:3px;color:#6a4a20;margin-bottom:3px}
.wn-top-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#F9F0DC;margin-bottom:6px}
.wn-card{background:#100800;border:1px solid #1a1200;padding:.65rem .75rem;margin-bottom:7px;display:flex;gap:9px}
.wn-poster{width:50px;height:73px;object-fit:cover;object-position:top;flex-shrink:0;border:1px solid #1a1200}
.wn-ph{width:50px;height:73px;flex-shrink:0;border:1px solid #1a1200;background:#080400;display:flex;align-items:center;justify-content:center;font-size:16px;color:#1a1200}
.wn-meta{flex:1;min-width:0}
.wn-rank{font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:2px;margin-bottom:2px}
.wn-film-title{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:#F9F0DC;margin-bottom:2px}
.wn-info{font-size:9px;color:#4a3820;font-style:italic;margin-bottom:3px}
.wn-score{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:1px;margin-bottom:4px}
.avail-section{margin-top:.75rem}
.avail-label{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#6a5030;margin-bottom:.35rem;display:flex;align-items:center;gap:7px}
.avail-label::after{content:'';flex:1;height:1px;background:#1a1000}
.avail-row{display:flex;align-items:center;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid #0d0800;font-size:10px}
.avail-name{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px}
.avail-val{color:#6a5030;font-style:italic}
.avail-empty{color:#2a1f00;font-style:italic;font-size:10px}
.avail-form{margin-top:.65rem}
.avail-form-title{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:3px;color:#6a5030;margin-bottom:.35rem}
.avail-inputs{display:flex;gap:6px;align-items:flex-end}
.avail-inputs .field{flex:1}

/* ── FORMS ── */

function getInterestScore(m) {
  const iv = m.interestVotes||{};
  const vals = ALL_MEMBERS.map(n=>iv[n]).filter(v=>v>0);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}
function getInterestLabel(score) {
  if(score>=3.5)return 'Must Screen';
  if(score>=2.5)return 'Want to See';
  if(score>=1.5)return 'Maybe';
  if(score>0)return 'Low Interest';
  return 'Unvoted';
}
function getTierFromScore(score) {
  if(!score)return null;
  const s=parseInt(score);
  if(s>=9)return 's4';if(s>=7)return 's3';if(s>=5)return 's2';return 's1';
}
function getMyScore(m) { return S.user && m.ratings ? m.ratings[S.user] : null; }
function getClubAvg(m) {
  const vals = MEMBERS.map(n=>m.ratings?.[n]).filter(v=>v>0);
  return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
}

// ── FIRESTORE ──
async function initFirestore() {
  const snap=await getDocs(collection(db,'watchlist'));
  if(snap.empty){
    const batch=writeBatch(db);
    SEED_WATCHLIST.forEach(m=>batch.set(doc(db,'watchlist',m.id),{...m,picker:'Chris',notes:'',votes:{},interestVotes:{},poster:null,genre:'',tmdb:null,year:'',director:'',runtime:null,tagline:'',overview:'',cast:''}));
    SEED_WATCHED.forEach(m=>batch.set(doc(db,'watched',m.id),m));
    await batch.commit();
  }
  onSnapshot(collection(db,'watchlist'),snap=>{
    S.watchlist=snap.docs.map(d=>({...d.data(),id:d.id}));
    if(S.loaded){render();fetchMissing(S.watchlist,'watchlist');}
  });
  onSnapshot(collection(db,'watched'),snap=>{
    S.watched=snap.docs.map(d=>({...d.data(),id:d.id}));
    S.loaded=true; render(); fetchMissing(S.watched,'watched');
  });
  onSnapshot(doc(db,'config','screening'),snap=>{
    S.screening=snap.exists()?snap.data():null;
    if(S.loaded){checkExpiry();render();}
  });
  onSnapshot(doc(db,'config','membership'),snap=>{
    S.membership=snap.exists()?snap.data():{votes:{}};
    if(S.loaded)render();
  });
  onSnapshot(doc(db,'config','dateRequests'),snap=>{
    S.dateRequests=snap.exists()?snap.data():{requests:{}};
    if(S.loaded)render();
  });
  onSnapshot(doc(db,'config','screeningSeen'),snap=>{
    S.screeningSeen=snap.exists()?snap.data():{};
    if(S.loaded)render();
  });
}

async function fetchMissing(movies,coll) {
  // First: patch any watched docs whose poster matches a seed URL but is stored as null
  if(coll==='watched'){
    for(const m of movies){
      if(m.poster)continue;
      const seed=SEED_WATCHED.find(s=>s.id===m.id||s.title.toLowerCase()===m.title.toLowerCase());
      if(seed?.poster){
        try{ await updateDoc(doc(db,'watched',m.id),{poster:seed.poster}); }catch(e){}
        continue;
      }
    }
  }
  for(const m of movies){
    if(m.poster&&m.director)continue;
    try{
      const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB}&query=${encodeURIComponent(m.title)}&language=en-US&page=1`);
      const d=await r.json(); const hit=(d.results||[])[0]; if(!hit)continue;
      const upd={};
      if(!m.poster&&hit.poster_path)upd.poster=IMG+hit.poster_path;
      if(!m.year&&hit.release_date)upd.year=hit.release_date.slice(0,4);
      if(!m.tmdb&&hit.vote_average)upd.tmdb=hit.vote_average.toFixed(1);
      try{
        const dr=await fetch(`https://api.themoviedb.org/3/movie/${hit.id}?api_key=${TMDB}&language=en-US&append_to_response=credits`);
        const dd=await dr.json();
        if(!m.genre&&dd.genres?.length)upd.genre=dd.genres[0].name;
        if(!m.director){const dir=dd.credits?.crew?.find(c=>c.job==='Director');if(dir)upd.director=dir.name;}
        if(!m.runtime&&dd.runtime)upd.runtime=dd.runtime;
        if(!m.tagline)upd.tagline=dd.tagline||'';
        if(!m.overview&&dd.overview)upd.overview=dd.overview;
        if(!m.cast&&dd.credits?.cast)upd.cast=dd.credits.cast.slice(0,4).map(a=>a.name).join(', ');
      }catch(e){}
      if(Object.keys(upd).length)await updateDoc(doc(db,coll,m.id),upd);
    }catch(e){}
  }
}

// ── RENDER ──
function render() {
  if(!S.loaded)return;
  updateMarquee();
  updateScreeningDot();
  const c=document.getElementById('content');

  // Summary overlay
  if(S.showForm==='summary'){
    let ov=document.getElementById('sum-ov');
    if(!ov){ov=document.createElement('div');ov.id='sum-ov';ov.className='summary-overlay';document.getElementById('app').appendChild(ov);}
    ov.style.display='flex'; ov.innerHTML=buildSummary(); bindSummary(); return;
  } else { const ov=document.getElementById('sum-ov'); if(ov)ov.style.display='none'; }

  // Form overlays
  if(S.showForm==='add'){c.innerHTML='';showFormOverlay(buildAddForm());bindAddForm();return;}
  if(S.showForm==='add-screened'){c.innerHTML='';showFormOverlay(buildAddScreenedForm());bindAddScreenedForm();return;}
  if(S.showForm==='discover'){c.innerHTML='';showFormOverlay(buildDiscover());bindDiscover();return;}
  if(S.showForm==='schedule'){c.innerHTML='';showFormOverlay(buildScheduleForm());bindScheduleForm();return;}

  // Tab content — Vote tab gets its own scroll context
  if(S.tab==='vote'||S.tab==='score'){
    c.style.overflow='hidden'; c.style.padding='0'; c.style.display='flex'; c.style.flexDirection='column';
    if(S.tab==='vote')c.innerHTML=buildVoteTab();
    else c.innerHTML=buildScoreTab();
  } else {
    c.style.overflow=''; c.style.padding=''; c.style.display=''; c.style.flexDirection='';
    if(S.tab==='home')c.innerHTML=buildHome();
    else c.innerHTML=buildScreening();
  }

  bindEvents();
  if(S.tab==='screening'&&S.screening&&!isExpired())startCountdown();
}

function showFormOverlay(html) {
  let ov=document.getElementById('form-ov');
  if(!ov){ov=document.createElement('div');ov.id='form-ov';ov.className='form-overlay';document.getElementById('app').appendChild(ov);}

    document.getElementById('marquee-text').textContent=`${isLive()?'● NOW SCREENING':'◆ NEXT SCREENING'}  ·  ${sc.title}  ·  ${fmtDate(sc.showtime)}  ·  Doors ${fmtTime(sc.doorsTime)}  ·  Showtime ${fmtTime(sc.showtime)}                    `;

function updateScreeningDot() {
  const dot=document.getElementById('sc-dot'); if(!dot)return;
  if(S.screening&&!isExpired()&&S.user){
    const seen=S.screeningSeen||{};
    const scId=S.screening.showtime||'';
    dot.classList.toggle('show',seen[S.user]!==scId);
  } else { dot.classList.remove('show'); }
}

// ── HOME ──
function buildHome() {
  const u=S.user; const p=PROFILES[u];
  const myScores=S.watched.map(m=>m.ratings?.[u]).filter(v=>v>0);
  const myAvg=myScores.length?(myScores.reduce((a,b)=>a+b,0)/myScores.length).toFixed(1):'—';
  const myHigh=myScores.length?Math.max(...myScores):null;
  const myLow=myScores.length?Math.min(...myScores):null;
  const filmsScored=myScores.length;
  const scId=S.screening&&!isExpired()?S.screening.movieId:null;
  const unvotedCount=S.watchlist.filter(m=>m.id!==scId&&!m.interestVotes?.[u]).length;
  const unscoredCount=S.watched.filter(m=>!m.ratings?.[u]).length;

  // Most aligned member
  let alignedMember=null; let bestPct=0;
  MEMBERS.filter(n=>n!==u).forEach(n=>{
    const shared=S.watchlist.filter(m=>(m.interestVotes||{})[u]&&(m.interestVotes||{})[n]);
    if(shared.length<2)return;
    const agree=shared.filter(m=>Math.abs(((m.interestVotes||{})[u]||0)-((m.interestVotes||{})[n]||0))<=1).length;
    const pct=Math.round(agree/shared.length*100);
    if(pct>bestPct){bestPct=pct;alignedMember=n;}
  });
  const alignedP=alignedMember?PROFILES[alignedMember]:null;

  let html=`<div class="user-panel" style="border-color:${p.border};background:${p.bg}">
    <div class="up-name" style="color:${p.color}">${u}</div>
    <div class="up-alias" style="color:${p.color}">${p.alias}</div>
    <div class="stats">
      <div class="stat"><div class="stat-val">${myAvg}</div><div class="stat-label">Your Avg</div></div>
      <div class="stat"><div class="stat-val">${myHigh||'—'}</div><div class="stat-label">Highest</div></div>
      <div class="stat"><div class="stat-val">${myLow||'—'}</div><div class="stat-label">Lowest</div></div>
      <div class="stat"><div class="stat-val">${filmsScored||'—'}</div><div class="stat-label">Scored</div></div>
    </div>
    ${alignedMember?`<div style="font-size:10px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#4a3820;margin-top:.5rem">Most aligned with <span style="color:${alignedP.color}">${alignedMember}</span> · ${bestPct}% match</div>`:''}
    <div style="display:flex;gap:8px;margin-top:.65rem">
      ${unvotedCount>0?`<div style="flex:1;text-align:center;padding:8px 4px;border:1px solid #3a2f00;cursor:pointer;background:#0a0500" id="home-vote-btn">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#c89a30">${unvotedCount}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;color:#4a3820">Unvoted</div>
      </div>`:''}
      ${unscoredCount>0?`<div style="flex:1;text-align:center;padding:8px 4px;border:1px solid #3a2f00;cursor:pointer;background:#0a0500" id="home-score-btn">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#c89a30">${unscoredCount}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;color:#4a3820">Unscored</div>
      </div>`:''}
    </div>
  </div>`;

  // Club Pulse
  const ranked=[...S.watchlist].filter(m=>m.id!==scId).map(m=>({...m,score:getInterestScore(m)})).filter(m=>m.score>0).sort((a,b)=>b.score-a.score).slice(0,3);
  html+=`<div class="sh">Club Pulse</div>`;
  if(ranked.length){
    const rankColors=['#F5C842','#aaaaaa','#8B5E3C']; const rankLabels=['1st','2nd','3rd'];
    html+=`<div class="pulse-grid">`;
    ranked.forEach((m,i)=>{
      const scoreColor=m.score>=3.5?'#F5C842':m.score>=2.5?'#90c830':'#4090c0';
      const pips=ALL_MEMBERS.map(n=>{const v=(m.interestVotes||{})[n];const c=v===4?'#E8A020':v===3?'#5a8a10':v===2?'#2a6080':v===1?'#5a2020':'#1a1000';return `<span class="pip" style="background:${c}"></span>`;}).join('');
      html+=`<div class="pc" data-action="go-vote" data-id="${m.id}" style="cursor:pointer"><${m.poster?`img class="pc-poster" src="${m.poster}" loading="lazy" alt=""`:`div class="pc-ph">🎬<`}/><div class="pc-rank" style="color:${rankColors[i]}">${rankLabels[i]}</div><div class="pc-info"><div class="pc-title">${esc(m.title)}</div><div class="pc-score" style="color:${scoreColor}">${m.score.toFixed(1)}</div><div class="pips">${pips}</div></div></div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div style="text-align:center;padding:1.2rem;color:#2a1f00;font-style:italic;font-size:12px;border:1px solid #1a1000;margin-bottom:6px">Cast interest votes on the Vote tab to see the Club Pulse.</div>`;
  }

  return html;
}

  if(!sc) return buildWhatsNext();
  if(isExpired()) return buildPostScreening(sc);
  const live=isLive(); const rsvp=sc.rsvp||{};

    <div class="cd"><div class="cd-val" id="cd-s">--</div><div class="cd-label">Sec</div></div>
  </div>`;
  // RSVP
  const myRsvp=rsvp[u];
  const np=PROFILES[u]||PROFILES['Chris'];
  if(!myRsvp){
    html+=`<div style="background:#1a1000;border:2px solid #c89a30;padding:.85rem;margin-bottom:.6rem;text-align:center">
      <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:#b89a40;margin-bottom:.6rem">Are you coming?</div>

        <span class="rsvp-chip" style="font-size:13px;padding:10px 28px;border-color:${np.border};cursor:pointer" data-rsvp="${u}" data-rsvp-val="yes">✓ Going</span>
        <span class="rsvp-chip" style="font-size:13px;padding:10px 28px;cursor:pointer" data-rsvp="${u}" data-rsvp-val="no">✗ Can't Make It</span>
      </div>

  const allAttending=MEMBERS.every(n=>rsvp[n]==='yes');
  if(allAttending){
    html+=`<div style="border:2px solid #c89a30;background:#1a1000;padding:.85rem;margin-bottom:.6rem;text-align:center">

      </div>
    </div>`;
  } else {
    html+=`<div class="rsvp-wrap"><div class="rsvp-title">Who's Coming</div><div class="rsvp-grid">`;
    MEMBERS.forEach(n=>{
      const np=PROFILES[n]; const status=rsvp[n]; const isMe=n===u;
      html+=`<div class="rsvp-member"><div class="rsvp-who" style="color:${np.color}">${n}</div><div class="rsvp-chips">`;
      if(isMe){
        html+=`<span class="rsvp-chip${status==='yes'?' yes':''}" style="${status==='yes'?`border-color:${np.color};color:${np.color}`:''}" data-rsvp="${n}" data-rsvp-val="yes">✓</span>`;
        html+=`<span class="rsvp-chip${status==='no'?' no':''}" data-rsvp="${n}" data-rsvp-val="no">✗</span>`;

function startCountdown() {
  if(S.countdownInterval)clearInterval(S.countdownInterval);
  const tick=()=>{
    if(!S.screening)return;
    const diff=new Date(S.screening.showtime).getTime()-Date.now();
    if(diff<=0){clearInterval(S.countdownInterval);render();return;}
    const pad=n=>String(n).padStart(2,'0');
    const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
    const el=id=>document.getElementById(id);
    if(el('cd-d'))el('cd-d').textContent=d;if(el('cd-h'))el('cd-h').textContent=pad(h);if(el('cd-m'))el('cd-m').textContent=pad(m);if(el('cd-s'))el('cd-s').textContent=pad(s);
  };
  tick(); S.countdownInterval=setInterval(tick,1000);
}

// ── SUMMARY ──
function buildSummary() {
  const m=S.watched.find(x=>x.id===S.summaryId); if(!m)return '<div class="empty">Film not found.</div>';
  const u=S.user; const r=m.ratings||{};
  const memberScores=MEMBERS.map(n=>({name:n,score:r[n]||null})).filter(x=>x.score);
  const vals=memberScores.map(x=>x.score);
  const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
  const sorted=[...memberScores].sort((a,b)=>b.score-a.score);
  const highest=sorted[0]; const lowest=sorted[sorted.length-1];
  let closestPair=null,closestDiff=99,biggestPair=null,biggestDiff=0;
  for(let i=0;i<memberScores.length;i++)for(let j=i+1;j<memberScores.length;j++){
    const diff=Math.abs(memberScores[i].score-memberScores[j].score);
    if(diff<closestDiff){closestDiff=diff;closestPair=[memberScores[i].name,memberScores[j].name];}
    if(diff>biggestDiff){biggestDiff=diff;biggestPair=[memberScores[i].name,memberScores[j].name];}
  }
  const pickerP=PROFILES[m.picker]||PROFILES['Chris'];
  let html=`<div class="sum-hdr"><div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:#F5C842">Summary</div><div class="sum-back" id="sum-back-btn">← Back</div></div>
  <div class="sum-body">`;
  html+=m.poster?`<img class="sum-poster" src="${m.poster}" loading="lazy" alt="">`: `<div class="sum-poster-ph">🎬</div>`;
  html+=`<div class="sum-title">${esc(m.title)}</div>
    <div class="sum-sub">${m.year||''}${m.year&&m.genre?' · ':''}${m.genre||''} · <span style="color:${pickerP.color}">${m.picker}'s pick</span></div>`;
  if(avg)html+=`<div class="sum-avg">${avg}</div><div class="sum-avg-label">Club Average</div>`;
  html+=`<div class="sum-scores">
    ${MEMBERS.map(n=>{const np=PROFILES[n];const score=r[n];return `<div class="ss" style="border-color:${np.border};background:${np.bg}"><div class="ss-name" style="color:${np.color}">${n}</div><div class="ss-score" style="color:${score?np.color:'#2a1f00'}">${score||'—'}</div></div>`;}).join('')}
  </div>`;
  if(highest&&lowest&&highest.name!==lowest.name){
    html+=`<div class="sum-stat"><div class="sum-stat-label">Highest Score</div><div class="sum-stat-val" style="color:${PROFILES[highest.name].color}">${highest.name} — ${highest.score}/10</div></div>`;
    html+=`<div class="sum-stat"><div class="sum-stat-label">Lowest Score</div><div class="sum-stat-val" style="color:${PROFILES[lowest.name].color}">${lowest.name} — ${lowest.score}/10</div></div>`;
  }
  const spread=highest&&lowest?highest.score-lowest.score:0;
  if(spread>0)html+=`<div class="sum-stat"><div class="sum-stat-label">Score Spread</div><div class="sum-stat-val">${spread} pts — ${spread>=4?'Controversial':'Consensus'}</div></div>`;
  if(biggestPair&&biggestDiff>=2)html+=`<div class="sum-stat"><div class="sum-stat-label">Biggest Disagreement</div><div class="sum-stat-val"><span style="color:${PROFILES[biggestPair[0]].color}">${biggestPair[0]}</span> vs <span style="color:${PROFILES[biggestPair[1]].color}">${biggestPair[1]}</span> (${biggestDiff} pts apart)</div></div>`;
  if(closestPair&&closestDiff===0)html+=`<div class="sum-stat"><div class="sum-stat-label">Perfect Agreement</div><div class="sum-stat-val"><span style="color:${PROFILES[closestPair[0]].color}">${closestPair[0]}</span> & <span style="color:${PROFILES[closestPair[1]].color}">${closestPair[1]}</span></div></div>`;
  if(m.tmdb)html+=`<div class="sum-stat"><div class="sum-stat-label">TMDB Rating</div><div class="sum-stat-val">${m.tmdb}/10 — Club ${avg&&parseFloat(avg)>parseFloat(m.tmdb)?'rated higher':'rated lower'} than audiences</div></div>`;
  return html+'</div>';
}

let _liveTimer;
function bindLiveSearchInput(inp, res, ctx) {
  inp.addEventListener('input',()=>{
    clearTimeout(_liveTimer);
    const q=inp.value.trim();
    if(q.length<2){res.style.display='none';return;}
    _liveTimer=setTimeout(async()=>{
      try{
        const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB}&query=${encodeURIComponent(q)}&language=en-US&page=1`);
        const d=await r.json(); const results=(d.results||[]).slice(0,6);
        if(!results.length){res.style.display='none';return;}
        res.style.display='block';
        res.innerHTML=results.map(m=>`
          <div data-live-id="${m.id}" data-live-title="${esc(m.title||'')}" data-live-year="${m.release_date?m.release_date.slice(0,4):''}" data-live-poster="${m.poster_path?IMG+m.poster_path:''}"
            style="display:flex;gap:9px;align-items:center;padding:.5rem .75rem;border-bottom:1px solid #1a1000;cursor:pointer">
            ${m.poster_path?`<img src="${IMG+m.poster_path}" style="width:28px;height:42px;object-fit:cover;object-position:center;flex-shrink:0;border:1px solid #1a1200">`:'<div style="width:28px;height:42px;background:#1a1000;flex-shrink:0"></div>'}
            <div>
              <div style="font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#F9F0DC">${esc(m.title||'')}</div>
              <div style="font-size:10px;color:#6a5030">${m.release_date?m.release_date.slice(0,4):''}</div>
            </div>
          </div>`).join('');
        res.querySelectorAll('[data-live-id]').forEach(el=>el.addEventListener('click',async()=>{
          const id=parseInt(el.dataset.liveId);
          inp.value=el.dataset.liveTitle;
          res.style.display='none';
          S.fd.title=el.dataset.liveTitle;
          S.fd.year=el.dataset.liveYear;
          S.fd.poster=el.dataset.livePoster||null;
          S.fd.tmdbId=id;
          // Fetch full details
          try{
            const dr=await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB}&language=en-US&append_to_response=credits`);
            const dd=await dr.json();
            S.fd.genre=dd.genres?.[0]?.name||'';
            S.fd.tmdb=dd.vote_average?dd.vote_average.toFixed(1):null;
            const dir=dd.credits?.crew?.find(c=>c.job==='Director'); if(dir)S.fd.director=dir.name;
            if(dd.runtime)S.fd.runtime=dd.runtime;
            if(dd.tagline)S.fd.tagline=dd.tagline;
            if(dd.overview)S.fd.overview=dd.overview;
            if(dd.credits?.cast)S.fd.cast=dd.credits.cast.slice(0,4).map(a=>a.name).join(', ');
          }catch(e){}
          // Re-render form in place — no closeFormOverlay
          const formEl=document.querySelector('.form-overlay');
          if(formEl){
            if(ctx==='add'){formEl.innerHTML=buildAddForm();bindAddForm();}
            else if(ctx==='add-screened'){formEl.innerHTML=buildAddScreenedForm();bindAddScreenedForm();}
          }
        }));
      }catch(e){res.style.display='none';}
    },300);
  });
}

async function loadDiscoverTab(tab) {
  if(window._rCache[tab]?.length){S.research.films=window._rCache[tab];S.research.loading=false;closeFormOverlay();S.showForm='discover';showFormOverlay(buildDiscover());bindDiscover();return;}
  let url='';
  const base=`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB}&language=en-US`;
  if(tab==='clubpicks'){
    const watchedDirs=[...new Set(S.watched.map(m=>m.director).filter(Boolean))];
    if(!watchedDirs.length){S.research.films=[];S.research.loading=false;closeFormOverlay();S.showForm='discover';showFormOverlay(buildDiscover());bindDiscover();return;}
    const seen=new Set([...S.watchlist,...S.watched].map(m=>m.title.toLowerCase()));
    const allFilms=[];
    await Promise.all(watchedDirs.slice(0,6).map(async dirName=>{
      try{
        const sp=await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB}&query=${encodeURIComponent(dirName)}&language=en-US`);
        const sd=await sp.json();const person=(sd.results||[]).find(p=>p.known_for_department==='Directing')||(sd.results||[])[0];if(!person)return;
        const rm=await fetch(`https://api.themoviedb.org/3/person/${person.id}/movie_credits?api_key=${TMDB}`);
        const dm=await rm.json();
        const films=(dm.crew||[]).filter(m=>m.job==='Director'&&m.poster_path&&!seen.has((m.title||'').toLowerCase())).sort((a,b)=>(b.vote_count||0)-(a.vote_count||0)).slice(0,4);
        allFilms.push(...films);
      }catch(e){}
    }));
    const dedup=new Set();const result=allFilms.filter(m=>{if(dedup.has(m.id))return false;dedup.add(m.id);return true;}).sort((a,b)=>(b.vote_count||0)-(a.vote_count||0)).slice(0,18);
    window._rCache['clubpicks']=result;S.research.films=result;
  } else {
    if(tab==='acclaimed')url=`${base}&sort_by=vote_average.desc&vote_count.gte=3000&with_genres=18&without_genres=16%2C10751%2C35%2C10749&vote_average.gte=7.5`;
    if(tab==='newreleases')url=`${base}&sort_by=primary_release_date.desc&vote_count.gte=200&with_genres=18%2C80%2C53&without_genres=16%2C10751%2C35%2C10749&primary_release_date.gte=2022-01-01&vote_average.gte=6.5`;
    if(tab==='worldcinema')url=`${base}&sort_by=vote_average.desc&vote_count.gte=500&with_original_language=fr%7Cit%7Cja%7Cko%7Cde%7Ces%7Cpt%7Czh%7Cru%7Cfa&vote_average.gte=7.0`;
    if(tab==='classic')url=`${base}&sort_by=vote_average.desc&vote_count.gte=500&primary_release_date.lte=1979-12-31&with_genres=18%2C80%2C53&without_genres=16%2C10751%2C35&vote_average.gte=7.5`;
    if(!url){S.research.loading=false;return;}
    try{const r=await fetch(url);const d=await r.json();const films=(d.results||[]).filter(m=>m.poster_path);window._rCache[tab]=films;S.research.films=films;}catch(e){S.research.films=[];}
  }
  S.research.loading=false;
  if(S.showForm==='discover'){closeFormOverlay();S.showForm='discover';showFormOverlay(buildDiscover());bindDiscover();}
}

async function loadDirectorFilms(personId,directorName) {
  const key='dir_'+personId;
  if(window._rCache[key]){S.research.films=window._rCache[key];S.research.loading=false;closeFormOverlay();S.showForm='discover';showFormOverlay(buildDiscover());bindDiscover();return;}
  try{
    let vid=personId;
    try{const sp=await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB}&query=${encodeURIComponent(directorName)}&language=en-US`);const sd=await sp.json();const match=(sd.results||[]).find(p=>p.known_for_department==='Directing')||(sd.results||[])[0];if(match)vid=match.id;}catch(e){}
    const r=await fetch(`https://api.themoviedb.org/3/person/${vid}/movie_credits?api_key=${TMDB}`);const d=await r.json();
    let films=(d.crew||[]).filter(m=>m.job==='Director'&&m.poster_path);
    if(!films.length)films=(d.crew||[]).filter(m=>m.department==='Directing'&&m.poster_path);
    films=films.sort((a,b)=>(b.vote_count||0)-(a.vote_count||0)).filter((m,i,arr)=>arr.findIndex(x=>x.id===m.id)===i).slice(0,18);
    window._rCache[key]=films; S.research.films=films;
  }catch(e){S.research.films=[];}
  S.research.loading=false;

// ── DATA OPS ──
async function saveScore(id,member,val) {
  const m=S.watched.find(x=>x.id===id); if(!m)return;
  const ratings={...(m.ratings||{})};
  const v=parseInt(val);
  if(v>=1&&v<=10)ratings[member]=v; else delete ratings[member];
  await updateDoc(doc(db,'watched',id),{ratings});
  const vals=MEMBERS.map(n=>ratings[n]).filter(v=>v>0);
  const el=document.getElementById('avg-'+id);
  if(el){el.textContent=vals.length?'Club Avg: '+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)+' / 10':'No scores yet';el.className='avg-bar'+(vals.length?' has':'');}
}

    <div style="font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;color:#c89a30;margin-bottom:.5rem;display:flex;align-items:center;gap:6px">Cast your vote<span style="flex:1;height:1px;background:#1a1000"></span></div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:.5rem">
      ${INTEREST_LEVELS.map(l=>`<div data-ivp-val="${l.val}" data-ivp-id="${filmId}" style="border:1px solid #2a1f00;background:#080400;padding:10px 6px;text-align:center;cursor:pointer">
        <div style="font-size:15px;color:#F9F0DC">${l.icon}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;color:#F9F0DC;margin-top:2px">${l.name}</div>
        <div style="font-size:9px;font-style:italic;color:#6a5030">${l.sub}</div>
      </div>`).join('')}
    </div>
    <div id="ivp-skip" style="font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;color:#3a2f00;text-align:center;cursor:pointer;padding:4px">Skip</div>
  </div>`;
}

function showInlineVotePrompt(filmId, filmTitle, onDone) {
  // For Add Film form — replace submit button area with vote prompt
  const footer=document.querySelector('#form-ov [style*="flex-shrink:0"][style*="border-top"]');
  if(!footer)return onDone();
  const btn=footer.querySelector('#submit-add-btn');
  if(btn)btn.style.display='none';
  const cancel=footer.querySelector('#cancel-add-btn');
  if(cancel)cancel.style.display='none';
  const prompt=document.createElement('div');
  prompt.innerHTML=buildVotePromptHTML(filmId);
  footer.appendChild(prompt.firstElementChild);
  bindVotePrompt(filmId, footer, onDone);
}

function showInlineVotePromptEl(filmId, filmTitle, el, onDone) {
  // For Discover — append to given element
  const qBtn=el.querySelector('#d-queue-btn');
  if(qBtn)qBtn.style.display='none';
  const prompt=document.createElement('div');
  prompt.innerHTML=buildVotePromptHTML(filmId);
  el.appendChild(prompt.firstElementChild);
  bindVotePrompt(filmId, el, onDone);
}

function bindVotePrompt(filmId, container, onDone) {
  container.querySelectorAll('[data-ivp-val]').forEach(el=>{
    el.addEventListener('click',async()=>{
      const val=parseInt(el.dataset.ivpVal);
      await castInterestVote(filmId, val);
      // Show confirmation
      const prompt=container.querySelector('#inline-vote-prompt');
      if(prompt){
        prompt.innerHTML=`<div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:#F5C842;text-align:center;padding:.75rem">✓ Vote Cast</div>`;
        setTimeout(onDone, 900);
      } else { onDone(); }
    });
  });
  container.querySelector('#ivp-skip')?.addEventListener('click', onDone);
}

async function castInterestVote(id,val) {
  const m=S.watchlist.find(x=>x.id===id); if(!m)return;
  const iv={...(m.interestVotes||{})};
  if(iv[S.user]===val)delete iv[S.user]; else iv[S.user]=val;
  await updateDoc(doc(db,'watchlist',id),{interestVotes:iv});
}

async function setRsvp(member,status) {
  if(!S.screening)return;
  const rsvp={...(S.screening.rsvp||{})};
  rsvp[member]=rsvp[member]===status?null:status;
  await updateDoc(doc(db,'config','screening'),{rsvp});
}
async function saveDateRequest(date,time) {
  const reqs={...((S.dateRequests?.requests)||{})};
  reqs[S.user]={date,time};
  await setDoc(doc(db,'config','dateRequests'),{requests:reqs});
}
async function castMembershipVote(cand,vote) {
  const votes={...(S.membership?.votes||{})};
  if(!votes[cand])votes[cand]={};
  if(votes[cand][S.user]===vote)delete votes[cand][S.user]; else votes[cand][S.user]=vote;
  await setDoc(doc(db,'config','membership'),{votes});
}
async function promoteCandidate(cand) {
  if(S.user!=='Chris')return;
  const promoted={...(S.membership?.promoted||{})};
  promoted[cand]=true;
  await updateDoc(doc(db,'config','membership'),{promoted});
}
function checkExpiry() {
  if(!S.screening||!isExpired()||S.screening.autoMoved)return;
  handleExpiry();
}
async function handleExpiry() {
  const sc=S.screening; if(!sc||sc.autoMoved)return;
  await updateDoc(doc(db,'config','screening'),{autoMoved:true});
  const film=S.watchlist.find(x=>x.id===sc.movieId);
  if(film&&!sc.watchedId){
    const newId='v'+Date.now(); const batch=writeBatch(db);
    batch.set(doc(db,'watched',newId),{...film,id:newId,ratings:{},comments:{},screenedDate:new Date().toISOString()});
    batch.delete(doc(db,'watchlist',sc.movieId));
    await batch.commit();
    await updateDoc(doc(db,'config','screening'),{watchedId:newId});
  }
}
async function delFilm(id,coll) { await deleteDoc(doc(db,coll,id)); }

function showConfirm(id,coll) {
  const m=coll==='watchlist'?S.watchlist.find(x=>x.id===id):S.watched.find(x=>x.id===id); if(!m)return;
  const ov=document.createElement('div'); ov.className='confirm-overlay';
  ov.innerHTML=`<div class="confirm-box"><div class="confirm-title">Remove Film?</div><div class="confirm-sub"><em style="color:#b89a40">${esc(m.title)}</em><br><br>This cannot be undone.</div><div class="confirm-actions"><button class="btn btn-red" id="c-yes">Remove</button><button class="btn btn-dim" id="c-no">Cancel</button></div></div>`;
  document.getElementById('app').appendChild(ov);
  ov.querySelector('#c-no').addEventListener('click',()=>ov.remove());
  ov.querySelector('#c-yes').addEventListener('click',()=>{
    ov.innerHTML=`<div class="confirm-box"><div class="confirm-title" style="color:#cc5050">Are You Sure?</div><div class="confirm-sub">⚠️<br>Chris will be mad if you remove<br><em style="color:#b89a40">${esc(m.title)}</em><br>by mistake.</div><div class="confirm-actions"><button class="btn btn-red" id="c-final">Yes, Remove It</button><button class="btn btn-dim" id="c-no2">Cancel</button></div></div>`;
    ov.querySelector('#c-no2').addEventListener('click',()=>ov.remove());
    ov.querySelector('#c-final').addEventListener('click',()=>{delFilm(id,coll);ov.remove();});
  });
}

// ── BIND EVENTS ──
function bindEvents() {
  const get=id=>document.getElementById(id);
  get('discover-btn')?.addEventListener('click',()=>{S.research={mode:'home',tab:'clubpicks',films:[],loading:true,selected:null,detail:null,selectedDir:null};S.research={mode:'home',tab:'clubpicks',films:[],loading:false,selected:null,detail:null,selectedDir:null};S.showForm='discover';closeFormOverlay();showFormOverlay(buildDiscover());bindDiscover();});
  get('add-screened-btn')?.addEventListener('click',()=>{S.fd={};S.showForm='add-screened';closeFormOverlay();showFormOverlay(buildAddScreenedForm());bindAddScreenedForm();});
  get('add-btn')?.addEventListener('click',()=>{S.fd={};S.showForm='add';closeFormOverlay();showFormOverlay(buildAddForm());bindAddForm();});
  get('home-vote-btn')?.addEventListener('click',()=>showVoteMode(0));
  get('home-score-btn')?.addEventListener('click',()=>showScoreMode(0));
  get('cast-vote-btn')?.addEventListener('click',()=>showVoteMode(0));
  get('quick-score-btn')?.addEventListener('click',()=>showScoreMode(0));
  get('write-reviews-btn')?.addEventListener('click',()=>showScoreMode(0));
  get('seed-watched-btn')?.addEventListener('click',async()=>{
    const btn=get('seed-watched-btn');if(btn){btn.textContent='Seeding...';btn.style.pointerEvents='none';}
    const batch=writeBatch(db);
    SEED_WATCHED.forEach(m=>batch.set(doc(db,'watched',m.id),m));
    await batch.commit();
  });
  get('go-score-btn')?.addEventListener('click',()=>{
    S.tab='score';
    document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===3));
    render();
  });
  get('schedule-btn')?.addEventListener('click',()=>{S.fd={};S.showForm='schedule';closeFormOverlay();showFormOverlay(buildScheduleForm());bindScheduleForm();});
  get('clear-sc-btn')?.addEventListener('click',()=>deleteDoc(doc(db,'config','screening')));

  get('submit-req-btn')?.addEventListener('click',()=>{const d=get('req-date')?.value;const t=get('req-time')?.value;if(d&&t)saveDateRequest(d,t);});
  document.querySelectorAll('[data-schedule-film]').forEach(btn=>btn.addEventListener('click',()=>{S.fd={_preselect:btn.dataset.scheduleFilm};S.showForm='schedule';closeFormOverlay();showFormOverlay(buildScheduleForm());bindScheduleForm();}));
  document.querySelectorAll('[data-rsvp]').forEach(el=>el.addEventListener('click',()=>setRsvp(el.dataset.rsvp,el.dataset.rsvpVal)));
  document.querySelectorAll('[data-panel-vote]').forEach(el=>el.addEventListener('click',()=>castMembershipVote(el.dataset.panelCand,el.dataset.panelVote)));
  document.querySelectorAll('[data-promote]').forEach(el=>el.addEventListener('click',()=>promoteCandidate(el.dataset.promote)));
  document.querySelectorAll('[data-list-trailer-id]').forEach(btn=>btn.addEventListener('click',async()=>{
    const id=btn.dataset.listTrailerId; const title=btn.dataset.listTrailerTitle; const year=btn.dataset.listTrailerYear;
    const sec=document.getElementById('trailer-list-sec-'+id); if(!sec)return;
    btn.textContent='▶ Loading...'; btn.style.pointerEvents='none';
    try{
      const q=encodeURIComponent(title+' '+year+' official trailer');
      const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&videoEmbeddable=true&videoSyndicated=true&maxResults=3&key=${YT}`);
      const d=await r.json(); const items=d.items||[];
      if(items.length){
        const vid=items[0].id.videoId;
        sec.innerHTML=`<div class="trailer-wrap"><iframe src="https://www.youtube-nocookie.com/embed/${vid}?rel=0&modestbranding=1" allowfullscreen allow="encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe></div><div class="trailer-row" style="display:flex;justify-content:flex-end;margin-bottom:.3rem"><span style="font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;color:#2a1f00;cursor:pointer" data-hide-trailer="${id}">Hide ✕</span></div>`;
        sec.querySelector('[data-hide-trailer]')?.addEventListener('click',()=>{sec.innerHTML=`<div class="trailer-btn" data-list-trailer-id="${id}" data-list-trailer-title="${title}" data-list-trailer-year="${year}">▶ Watch Trailer</div>`;bindEvents();});
        return;
      }
    }catch(e){}
    btn.textContent='No trailer found'; btn.style.color='#2a1f00';
  }));
  document.querySelectorAll('[data-int-id]').forEach(el=>el.addEventListener('click',()=>castInterestVote(el.dataset.intId,parseInt(el.dataset.intVal))));
  document.querySelectorAll('[data-score-id]').forEach(el=>el.addEventListener('click',()=>{
    if(el.dataset.scoreMember!==S.user)return;
    const m=S.watched.find(x=>x.id===el.dataset.scoreId);
    const cur=m?.ratings?.[S.user]; const curTier=getTierFromScore(cur); const newTier=SCORE_TIERS.find(t=>t.val===parseInt(el.dataset.scoreVal))?.cls;
    saveScore(el.dataset.scoreId,S.user,curTier===newTier?null:parseInt(el.dataset.scoreVal));
  }));


  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',()=>{
    const{action,id}=el.dataset;
    if(action==='view-summary'){S.summaryId=id;S.showForm='summary';render();}
    if(action==='remove-watch')showConfirm(id,'watchlist');
    if(action==='remove-watched')showConfirm(id,'watched');
    if(action==='go-review'){const fi=getScoreFilms().findIndex(m=>m.id===id);showScoreMode(fi>=0?fi:0);}
    if(action==='go-vote'){const films=[...S.watchlist].sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));const fi=films.findIndex(m=>m.id===id);S.voteFilmsOverride=films;showVoteMode(fi>=0?fi:0);}
    if(action==='go-vote'){const fi=getUnvotedFilms().findIndex(m=>m.id===id);showVoteMode(fi>=0?fi:0);}
  }));

  // Expand delegation
  document.addEventListener('click',function expHandler(e){
    const btn=e.target.closest('.expand-btn'); if(!btn)return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
    e.preventDefault(); e.stopPropagation();
    const id=btn.dataset.expId; const panel=document.getElementById('exp-'+id); const arrow=document.getElementById('exp-arrow-'+id);
    if(!panel)return;
    const open=panel.classList.contains('open');
    panel.classList.toggle('open',!open); if(arrow)arrow.textContent=open?'▼':'▲';
  },true);
}

// ── SW CLEANUP ──
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));}
if('caches' in window){caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));}

// ── BOOT ──
const saved=localStorage.getItem('cmc_user');
if(saved&&PROFILES[saved]){
  S.user=saved;
  const main=document.getElementById('main');
  main.style.display='flex';
  setAvatar(saved);
  initFirestore();
} else {
  showIdentity();
}
</script>
